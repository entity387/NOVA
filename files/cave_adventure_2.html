<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Someone Like You: The Road Home</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --green:#00ff41; --dim:#00a82a; --dimmer:#005514;
  --bg:#0a0a0a; --amber:#ffb000; --blue:#88ccff; --cyan:#00ffcc;
  --purple:#cc88ff; --yellow:#ffcc44;
}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--green);overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:999;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:998;}
#terminal{width:100%;height:100%;display:flex;flex-direction:column;padding:20px;max-width:900px;margin:0 auto;}
#header{border-bottom:1px solid var(--dimmer);padding-bottom:12px;margin-bottom:16px;flex-shrink:0;}
.title-art{font-family:'VT323',monospace;font-size:10px;color:var(--dim);line-height:1.2;white-space:pre;letter-spacing:0;}
.title-bar{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;}
.sys-label{font-size:11px;color:var(--dimmer);letter-spacing:2px;}
.achievement-count{font-size:10px;color:var(--dimmer);cursor:pointer;}
#screen{flex:1;overflow:hidden;position:relative;}
#content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:8px;}
#output{overflow:hidden;}
.line{font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word;opacity:0;animation:fadeIn 0.5s ease forwards;}
/* Narrators */
.line.narrator{color:var(--green);}
.line.narrator::before{content:'NARRATOR > ';color:var(--dimmer);font-size:12px;}
.line.gps{color:#aaddff;}
.line.gps::before{content:'GPS > ';color:#224455;font-size:12px;}
.line.voicemail{color:#ffaaaa;}
.line.voicemail::before{content:'VOICEMAIL > ';color:#442222;font-size:12px;}
.line.search{color:#aaffaa;}
.line.search::before{content:'SEARCH > ';color:#224422;font-size:12px;}
.line.ticker{color:#ffff88;}
.line.ticker::before{content:'BREAKING > ';color:#444422;font-size:12px;}
.line.demon{color:#ddaaff;}
.line.demon::before{content:'??? > ';color:#330044;font-size:12px;}
/* Hazel dialogue */
.line.hazel{color:var(--amber);}
.line.hazel::before{content:'hazel > ';color:#664400;font-size:12px;}
/* Other */
.line.isabelle{color:#ff88cc;}
.line.isabelle::before{content:'isabelle > ';color:#441133;font-size:12px;}
.line.system{color:var(--dimmer);font-size:13px;}
.line.prompt{color:var(--dim);font-size:13px;}
.line.achievement{color:var(--amber);font-size:13px;}
.line.art{color:var(--dim);font-size:13px;white-space:pre;font-family:'VT323',monospace;line-height:1.2;text-shadow:0 0 8px var(--dim);}
.line.end{color:var(--green);font-family:'VT323',monospace;font-size:24px;text-align:center;padding:8px 0;text-shadow:0 0 10px var(--green);}
.line.divider{color:var(--dimmer);font-size:11px;}
.line.credits{color:var(--dim);font-size:13px;line-height:1.9;}
#inputRow{flex-shrink:0;border-top:1px solid var(--dimmer);padding-top:10px;margin-top:8px;display:flex;align-items:center;gap:8px;}
#inputPrompt{color:var(--dim);font-size:14px;white-space:nowrap;flex-shrink:0;}
#inputField{flex:1;background:transparent;border:none;outline:none;color:var(--green);font-family:'Share Tech Mono',monospace;font-size:15px;caret-color:var(--green);}
#inputField::placeholder{color:var(--dimmer);}
.cursor-blink{display:inline-block;width:9px;height:16px;background:var(--green);animation:blink 1s step-end infinite;vertical-align:middle;}
@keyframes blink{50%{opacity:0;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<button onclick="if(confirm('Reset all achievements?')){localStorage.removeItem('novaCaveAch2');updateAchievementPanel();}" style="position:fixed;bottom:14px;right:14px;background:none;border:1px solid #1a1a1a;color:#222;font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;letter-spacing:1px;z-index:100;transition:all .2s" onmouseover="this.style.borderColor='#f00';this.style.color='#f00'" onmouseout="this.style.borderColor='#1a1a1a';this.style.color='#222'">RESET PROGRESS</button>
<button onclick="window.location.href='arcade.html'" style="position:fixed;top:14px;right:14px;background:none;border:1px solid #1a1a1a;color:#222;font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;letter-spacing:1px;z-index:100;transition:all .2s" onmouseover="this.style.borderColor='#00ff41';this.style.color='#00ff41'" onmouseout="this.style.borderColor='#1a1a1a';this.style.color='#222'">◄ ARCADE</button>
<button onclick="window.location.href='cave_adventure.html'" style="position:fixed;top:14px;right:100px;background:none;border:1px solid #1a1a1a;color:#222;font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;letter-spacing:1px;z-index:100;transition:all .2s" onmouseover="this.style.borderColor='#00a82a';this.style.color='#00a82a'" onmouseout="this.style.borderColor='#1a1a1a';this.style.color='#222'">◄ GAME I</button>
<div id="terminal">
  <div id="header">
    <div class="title-art" id="titleArt"></div>
    <div class="title-bar">
      <span class="sys-label">THE ROAD HOME</span>
      <span class="achievement-count" id="achCount">ACHIEVEMENTS: 0</span>
    </div>
  </div>
  <div id="screen">
    <div id="content">
      <div id="output"></div>
      <div id="inputRow">
        <span id="inputPrompt">&gt;&gt; HAZEL:</span>
        <input id="inputField" type="text" autocomplete="off" spellcheck="false" placeholder="type here...">
        <span class="cursor-blink"></span>
      </div>
    </div>
  </div>
</div>
<script src="cave_game2.js"></script>
</body>
</html>
