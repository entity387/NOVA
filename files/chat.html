<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Chat</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap');

/* ── THEME VARIABLES ─────────────────────────────────────── */
:root,[data-theme="midnight"]{
  --bg:#080b10;--bg2:#0a0e15;--surface:#0d1117;--surface2:#161b22;--surface3:#1c2128;
  --glass:rgba(13,17,23,0.75);--glass2:rgba(22,27,34,0.8);
  --border:#21262d;--border2:#30363d;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;
  --glow:rgba(124,58,237,0.3);--glow2:rgba(124,58,237,0.12);
  --text:#e6edf3;--text-muted:#8b949e;--text-dim:#484f58;
  --success:#3fb950;--danger:#f85149;--warn:#d29922;--info:#58a6ff;
  --gold:#ffd700;--gold-dim:rgba(255,215,0,0.12);--gold-border:rgba(255,215,0,0.4);
  --grad:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#c084fc 100%);
  --shadow:0 8px 32px rgba(0,0,0,0.5);--shadow-sm:0 2px 8px rgba(0,0,0,0.3);
  --blur:blur(16px);--radius:12px;--radius-sm:8px;
  --transition:0.2s cubic-bezier(0.4,0,0.2,1);
  --spring:0.35s cubic-bezier(0.34,1.56,0.64,1);
  --mono:'Share Tech Mono',monospace;--ui:'Inter',sans-serif;
}
[data-theme="neon"]{
  --bg:#050508;--bg2:#07070c;--surface:#0a0a12;--surface2:#10101c;--surface3:#16162a;
  --glass:rgba(10,10,18,0.8);--glass2:rgba(16,16,28,0.85);
  --border:#1a1a2e;--border2:#252540;
  --accent:#00f5d4;--accent2:#00d4b4;--accent3:#7affed;
  --glow:rgba(0,245,212,0.3);--glow2:rgba(0,245,212,0.1);
  --text:#e0fff8;--text-muted:#6b8f87;--text-dim:#3a5552;
  --grad:linear-gradient(135deg,#00f5d4 0%,#00b4d8 50%,#7b2ff7 100%);
}
[data-theme="ocean"]{
  --bg:#030d1a;--bg2:#041020;--surface:#061525;--surface2:#0a1f35;--surface3:#0e2a45;
  --glass:rgba(6,21,37,0.8);--glass2:rgba(10,31,53,0.85);
  --border:#0f2d47;--border2:#1a3d5c;
  --accent:#0ea5e9;--accent2:#38bdf8;--accent3:#7dd3fc;
  --glow:rgba(14,165,233,0.3);--glow2:rgba(14,165,233,0.1);
  --text:#e0f2fe;--text-muted:#64a0be;--text-dim:#2d5a78;
  --grad:linear-gradient(135deg,#0ea5e9 0%,#0284c7 50%,#075985 100%);
}
[data-theme="forest"]{
  --bg:#020d05;--bg2:#03110a;--surface:#05150a;--surface2:#091e10;--surface3:#0d2a17;
  --glass:rgba(5,21,10,0.8);--glass2:rgba(9,30,16,0.85);
  --border:#0f2d18;--border2:#1a3d24;
  --accent:#22c55e;--accent2:#4ade80;--accent3:#86efac;
  --glow:rgba(34,197,94,0.3);--glow2:rgba(34,197,94,0.1);
  --text:#dcfce7;--text-muted:#5a8a68;--text-dim:#2d5a3a;
  --grad:linear-gradient(135deg,#22c55e 0%,#16a34a 50%,#d97706 100%);
}
[data-theme="sunset"]{
  --bg:#0f050a;--bg2:#15070d;--surface:#1a080f;--surface2:#240c16;--surface3:#2e101e;
  --glass:rgba(26,8,15,0.8);--glass2:rgba(36,12,22,0.85);
  --border:#3d1020;--border2:#521528;
  --accent:#f97316;--accent2:#fb923c;--accent3:#fdba74;
  --glow:rgba(249,115,22,0.3);--glow2:rgba(249,115,22,0.1);
  --text:#fff7ed;--text-muted:#8a6050;--text-dim:#5a3525;
  --grad:linear-gradient(135deg,#f97316 0%,#ec4899 50%,#8b5cf6 100%);
}
[data-theme="light"]{
  --bg:#f8fafc;--bg2:#f1f5f9;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e2e8f0;
  --glass:rgba(255,255,255,0.85);--glass2:rgba(241,245,249,0.9);
  --border:#e2e8f0;--border2:#cbd5e1;
  --accent:#6d28d9;--accent2:#7c3aed;--accent3:#8b5cf6;
  --glow:rgba(109,40,217,0.2);--glow2:rgba(109,40,217,0.08);
  --text:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;
  --success:#16a34a;--danger:#dc2626;--warn:#d97706;--info:#2563eb;
  --gold:#ca8a04;--gold-dim:rgba(202,138,4,0.1);--gold-border:rgba(202,138,4,0.3);
  --grad:linear-gradient(135deg,#6d28d9 0%,#7c3aed 50%,#8b5cf6 100%);
  --shadow:0 8px 32px rgba(0,0,0,0.12);--shadow-sm:0 2px 8px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--ui);display:flex;flex-direction:column;transition:background 0.5s,color 0.5s;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent2);}

/* ── KEYFRAMES ───────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes springIn{from{opacity:0;transform:scale(0.92) translateY(12px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.2);opacity:1}}
@keyframes ping{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes skeletonPulse{0%,100%{opacity:0.3}50%{opacity:0.6}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar{
  height:52px;background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;flex-shrink:0;z-index:50;
  position:relative;
  transition:background 0.5s;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:var(--grad);opacity:0.4;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.logo{
  font-family:var(--mono);font-size:18px;letter-spacing:6px;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar-right{display:flex;align-items:center;gap:8px;}

/* ── THEME SWITCHER ──────────────────────────────────────── */
.theme-btn{
  background:none;border:1px solid var(--border);color:var(--text-muted);
  font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:5px 10px;border-radius:20px;cursor:pointer;
  transition:all var(--transition);display:flex;align-items:center;gap:5px;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent2);}

.theme-picker{
  position:absolute;top:44px;right:0;
  background:var(--glass2);backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:8px;z-index:200;display:none;
  box-shadow:var(--shadow);animation:fadeUp 0.2s ease;
  min-width:180px;
}
.theme-picker.open{display:block;}
.theme-option{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;
  transition:background var(--transition);font-size:13px;color:var(--text-muted);
}
.theme-option:hover{background:var(--surface2);color:var(--text);}
.theme-option.active{background:var(--glow2);color:var(--accent2);}
.theme-swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);}

/* ── USER INFO ───────────────────────────────────────────── */
.user-info{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 8px;border-radius:var(--radius-sm);transition:background var(--transition);}
.user-info:hover{background:var(--surface2);}
.avatar{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden;
  position:relative;cursor:pointer;transition:all var(--transition);
}
.avatar:hover{transform:scale(1.05);}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ping-badge{
  position:absolute;top:-3px;right:-3px;background:var(--danger);color:#fff;
  font-family:var(--mono);font-size:8px;font-weight:700;
  min-width:14px;height:14px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  padding:0 2px;border:2px solid var(--bg);
  animation:ping 1s ease infinite;
}
.av-owner{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);}
.av-mod{background:rgba(88,166,255,0.18);color:var(--info);border:1px solid rgba(88,166,255,0.3);}
.av-staff{background:rgba(63,185,80,0.18);color:var(--success);border:1px solid rgba(63,185,80,0.3);}
.av-user{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.role-badge{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;padding:2px 8px;border-radius:20px;text-transform:uppercase;display:inline-flex;align-items:center;gap:3px;}
.rb-owner{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);}
.rb-mod{background:rgba(88,166,255,0.15);color:var(--info);border:1px solid rgba(88,166,255,0.3);}
.rb-staff{background:rgba(63,185,80,0.15);color:var(--success);border:1px solid rgba(63,185,80,0.3);}
.username-display{font-size:13px;font-weight:600;}
.btn-top{
  background:none;border:1px solid var(--border);color:var(--text-muted);
  font-family:var(--ui);font-size:12px;font-weight:500;
  padding:5px 12px;border-radius:20px;cursor:pointer;
  transition:all var(--transition);letter-spacing:0.5px;white-space:nowrap;
}
.btn-top:hover{border-color:var(--accent);color:var(--accent2);transform:translateY(-1px);}
.btn-dashboard{background:var(--glow2);border-color:var(--accent);color:var(--accent2);}
.btn-ticket{background:var(--glow2);border-color:var(--accent);color:var(--accent2);}
.voice-mode-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:20px;letter-spacing:1px;}
.vmt-agora{background:rgba(63,185,80,0.1);color:var(--success);border:1px solid rgba(63,185,80,0.2);}
.vmt-webrtc{background:rgba(210,153,34,0.1);color:var(--warn);border:1px solid rgba(210,153,34,0.2);}

/* ── LAYOUT ──────────────────────────────────────────────── */
.chat-layout{flex:1;display:flex;overflow:hidden;}

/* ── LEFT PANEL ──────────────────────────────────────────── */
.left-panel{
  width:240px;background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
  transition:background 0.5s;
}
.left-panel::-webkit-scrollbar{width:2px;}
.left-section{padding:10px 0 2px;}
.left-label{
  font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);
  text-transform:uppercase;padding:0 12px 5px;
  display:flex;align-items:center;justify-content:space-between;
}
.left-label-btn{
  background:none;border:none;color:var(--text-dim);font-size:16px;
  cursor:pointer;line-height:1;padding:0 2px;transition:all var(--transition);
  border-radius:4px;
}
.left-label-btn:hover{color:var(--accent2);background:var(--glow2);transform:rotate(90deg);}

.chan-item{
  display:flex;align-items:center;gap:7px;
  padding:7px 12px;cursor:pointer;border-radius:var(--radius-sm);
  margin:1px 6px;font-size:13px;font-weight:500;color:var(--text-muted);
  transition:all var(--transition);position:relative;overflow:hidden;
  animation:slideLeft 0.3s ease both;
}
.chan-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:var(--accent2);border-radius:0 2px 2px 0;
  transition:width var(--transition);
}
.chan-item:hover{background:var(--surface2);color:var(--text);transform:translateX(2px);}
.chan-item.active{background:var(--glow2);color:var(--text);}
.chan-item.active::before{width:2px;}
.chan-icon{font-size:12px;color:var(--text-dim);width:15px;text-align:center;flex-shrink:0;}
.chan-item.active .chan-icon{color:var(--accent2);}
.chan-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.unread-count{background:var(--danger);color:#fff;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:8px;flex-shrink:0;animation:ping 2s ease infinite;}

/* ── VOICE ITEMS ─────────────────────────────────────────── */
.voice-item{padding:5px 12px;margin:1px 6px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
.voice-item:hover{background:var(--surface2);}
.voice-item.in-room{background:rgba(63,185,80,0.07);border:1px solid rgba(63,185,80,0.15);}
.voice-item-row{display:flex;align-items:center;gap:7px;}
.voice-item-icon{font-size:12px;color:var(--text-dim);}
.voice-item-name{font-size:13px;font-weight:500;color:var(--text-muted);}
.voice-item.in-room .voice-item-name{color:var(--success);}
.voice-item-count{font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-left:auto;}
.voice-part-list{padding-left:20px;margin-top:3px;}
.voice-part{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);padding:1px 0;}

/* ── CENTER ──────────────────────────────────────────────── */
.center-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chan-header{
  height:50px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  position:relative;transition:background 0.5s;
}
.chan-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:var(--grad);opacity:0.15;
}
.chan-header-icon{font-size:15px;color:var(--text-dim);}
.chan-header-name{font-size:15px;font-weight:700;letter-spacing:0.3px;}
.chan-header-desc{font-size:12px;color:var(--text-muted);}
.chan-readonly-tag{
  margin-left:auto;font-family:var(--mono);font-size:9px;
  color:var(--text-dim);background:var(--surface2);
  padding:3px 8px;border-radius:20px;border:1px solid var(--border);
}

/* ── MESSAGES ────────────────────────────────────────────── */
.messages-area{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;}
.messages-area::-webkit-scrollbar{width:3px;}
.messages-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Skeleton loader */
.msg-skeleton{display:flex;gap:10px;padding:8px 18px;animation:fadeIn 0.3s ease;}
.skel-av{width:34px;height:34px;border-radius:50%;background:var(--surface2);flex-shrink:0;animation:skeletonPulse 1.5s ease infinite;}
.skel-body{flex:1;}
.skel-line{height:10px;background:var(--surface2);border-radius:4px;margin-bottom:7px;animation:skeletonPulse 1.5s ease infinite;}
.skel-line:nth-child(1){width:30%;}
.skel-line:nth-child(2){width:70%;}
.skel-line:nth-child(3){width:50%;}

.msg-group{
  display:flex;gap:10px;padding:2px 18px;
  animation:msgIn 0.18s ease both;
  position:relative;transition:background 0.15s;
}
.msg-group:hover{background:rgba(255,255,255,0.015);}
.msg-group.pinged{background:var(--glow2);border-left:2px solid var(--accent);}

/* Stacked messages (consecutive from same sender) */
.msg-group.stacked{padding-top:1px;padding-bottom:1px;}
.msg-group.stacked .msg-av-wrap{visibility:hidden;}

.msg-av-wrap{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  margin-top:2px;overflow:hidden;transition:transform var(--transition);
}
.msg-av-wrap:hover{transform:scale(1.08);}
.msg-av-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.msg-av-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;}

.msg-body{flex:1;min-width:0;}
.msg-meta{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;flex-wrap:wrap;}
.msg-author{font-size:14px;font-weight:700;transition:color var(--transition);}
.msg-author.owner{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.msg-author.mod{color:var(--info);}
.msg-author.staff{color:var(--success);}
.msg-author.user{color:var(--text);}
.msg-role-tag{font-family:var(--mono);font-size:8px;padding:1px 6px;border-radius:20px;text-transform:uppercase;}
.rb-owner{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);}
.rb-mod{background:rgba(88,166,255,0.15);color:var(--info);border:1px solid rgba(88,166,255,0.3);}
.rb-staff{background:rgba(63,185,80,0.15);color:var(--success);border:1px solid rgba(63,185,80,0.3);}
.msg-time{font-family:var(--mono);font-size:9px;color:var(--text-dim);}

.msg-text{
  font-size:14px;color:var(--text-muted);line-height:1.6;
  word-break:break-word;
}
.mention{color:var(--accent2);background:var(--glow2);padding:0 3px;border-radius:3px;cursor:pointer;font-weight:600;transition:background var(--transition);}
.mention:hover{background:var(--glow);}
.mention-everyone{color:var(--gold);background:rgba(255,215,0,0.1);padding:0 3px;border-radius:3px;font-weight:700;}
.system-msg{
  font-family:var(--mono);font-size:11px;color:var(--accent2);
  background:var(--glow2);border-left:2px solid var(--accent);
  padding:6px 10px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  white-space:pre-line;
}

/* Reply quote */
.reply-quote{
  background:var(--surface2);border-left:2px solid var(--border2);
  padding:3px 8px;border-radius:0 4px 4px 0;margin-bottom:3px;
  font-size:11px;color:var(--text-dim);cursor:pointer;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:border-color var(--transition);
}
.reply-quote:hover{border-left-color:var(--accent2);}
.reply-quote-author{color:var(--text-muted);font-weight:600;margin-right:5px;}

/* Message actions */
.msg-actions{
  display:none;position:absolute;right:18px;top:3px;
  gap:3px;background:var(--glass2);backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:3px 5px;z-index:10;
  animation:fadeIn 0.15s ease;
  box-shadow:var(--shadow-sm);
}
.msg-group:hover .msg-actions{display:flex;}
.mab{
  background:none;border:none;color:var(--text-dim);font-size:11px;
  padding:3px 7px;border-radius:4px;cursor:pointer;font-family:var(--ui);
  transition:all var(--transition);
}
.mab:hover{background:var(--surface2);color:var(--text);}
.mab.danger:hover{color:var(--danger);}

.date-div{
  display:flex;align-items:center;gap:10px;padding:10px 18px;
  color:var(--text-dim);font-family:var(--mono);font-size:9px;letter-spacing:1px;
}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border);}

.empty-chat{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text-dim);font-family:var(--mono);font-size:11px;
  letter-spacing:2px;gap:10px;animation:fadeIn 0.4s ease;
}
.empty-icon{font-size:32px;opacity:0.25;}

/* ── INPUT ───────────────────────────────────────────────── */
.input-wrap{flex-shrink:0;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid var(--border);transition:background 0.5s;}
.reply-bar{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text-muted);
  animation:fadeUp 0.2s ease;
}
.reply-bar-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reply-bar-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;transition:color var(--transition);}
.reply-bar-close:hover{color:var(--danger);}

.input-row{display:flex;align-items:flex-end;gap:8px;padding:10px 14px;}
.input-box{
  flex:1;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:9px 14px;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
.input-box:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--glow2),0 0 20px var(--glow2);
  background:var(--surface3);
}
.input-box textarea{
  width:100%;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--ui);font-size:14px;
  resize:none;height:22px;max-height:110px;overflow-y:auto;line-height:1.5;
}
.input-box textarea::placeholder{color:var(--text-dim);}

.btn-send{
  background:var(--grad);border:none;color:#fff;
  font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:2px;
  padding:10px 18px;border-radius:var(--radius);cursor:pointer;flex-shrink:0;
  transition:all var(--spring);
  box-shadow:0 2px 12px var(--glow);
}
.btn-send:hover{transform:translateY(-2px);box-shadow:0 4px 20px var(--glow);filter:brightness(1.1);}
.btn-send:active{transform:translateY(0) scale(0.97);}
.btn-send:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none;}

.input-hint{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:0 14px 8px;letter-spacing:0.5px;}
.readonly-bar{text-align:center;padding:14px;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text-dim);}
.blocked-bar{padding:10px 14px;margin:8px 14px;font-family:var(--mono);font-size:11px;border-radius:var(--radius-sm);}
.blocked-muted{background:rgba(210,153,34,0.08);border:1px solid rgba(210,153,34,0.2);color:var(--warn);}
.blocked-banned{background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.2);color:var(--danger);}

/* ── RIGHT PANEL ─────────────────────────────────────────── */
.right-panel{
  width:220px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;
  overflow-y:auto;transition:background 0.5s;
}
.right-section{padding:12px 0 6px;border-bottom:1px solid var(--border);}
.right-section:last-child{border-bottom:none;}
.right-label{
  font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);
  text-transform:uppercase;padding:0 12px 8px;
  display:flex;align-items:center;justify-content:space-between;
}

.member-item{
  display:flex;align-items:center;gap:7px;padding:5px 12px;
  border-radius:var(--radius-sm);margin:1px 4px;
  cursor:default;transition:all var(--transition);
}
.member-item:hover{background:var(--surface2);}
.member-av{
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;font-weight:700;flex-shrink:0;overflow:hidden;
}
.member-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.member-name{font-size:12px;font-weight:500;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.presence-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--surface1);}
.presence-dot.online{background:#3fb950;box-shadow:0 0 6px rgba(63,185,80,.5);animation:breathe 3s ease-in-out infinite;}
.presence-dot.away{background:#d29922;}
.presence-dot.offline{background:#484f58;}
.pgroup-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:8px 12px 3px;}

/* ── VOICE CONTROLS ──────────────────────────────────────── */
.voice-active-box{
  margin:6px 10px;
  background:rgba(63,185,80,0.07);
  border:1px solid rgba(63,185,80,0.2);
  border-radius:var(--radius);padding:10px 12px;
  animation:fadeUp 0.3s ease;
  box-shadow:0 0 20px rgba(63,185,80,0.08);
}
.vab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vab-name{font-size:13px;font-weight:600;color:var(--success);}
.vab-btns{display:flex;gap:5px;}
.vab-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-muted);font-size:11px;padding:4px 9px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:var(--ui);
  transition:all var(--transition);
}
.vab-btn:hover{border-color:var(--accent);color:var(--accent2);}
.vab-btn.muted-state{border-color:rgba(248,81,73,0.4);color:var(--danger);}
.vab-btn.leave-btn:hover{border-color:var(--danger);color:var(--danger);}

.voice-join-row{
  display:flex;align-items:center;gap:7px;padding:7px 12px;margin:2px 8px;
  border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;
  background:none;color:var(--text-muted);font-size:13px;font-weight:500;
  width:calc(100% - 16px);text-align:left;
  transition:all var(--transition);font-family:var(--ui);
}
.voice-join-row:hover{border-color:var(--success);color:var(--success);background:rgba(63,185,80,0.06);transform:translateX(2px);}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;
  z-index:500;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:fadeIn 0.2s ease;
}
.modal{
  background:var(--glass2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
  animation:springIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:var(--shadow),0 0 40px var(--glow2);
}
.modal-title{
  font-family:var(--mono);font-size:11px;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;transition:color var(--transition);}
.form-group:focus-within .form-label{color:var(--accent2);}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);
  font-size:13px;padding:9px 12px;outline:none;transition:all var(--transition);
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow2);}
.form-select option{background:var(--surface2);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
.btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-family:var(--ui);font-size:13px;font-weight:500;letter-spacing:0.5px;padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
.btn:hover{border-color:var(--accent);color:var(--accent2);transform:translateY(-1px);}
.btn:active{transform:translateY(0) scale(0.97);}
.btn-primary{background:var(--grad);border:none;color:#fff;font-weight:600;box-shadow:0 2px 8px var(--glow);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--glow);filter:brightness(1.1);}
.btn-danger{border-color:rgba(248,81,73,0.4);color:var(--danger);}
.btn-danger:hover{background:rgba(248,81,73,0.1);border-color:var(--danger);}
.btn-success{border-color:rgba(63,185,80,0.4);color:var(--success);}
.btn-success:hover{background:rgba(63,185,80,0.1);border-color:var(--success);}
.btn-warn{border-color:rgba(210,153,34,0.4);color:var(--warn);}
.btn-warn:hover{background:rgba(210,153,34,0.1);border-color:var(--warn);}
.btn-sm{padding:4px 10px;font-size:12px;}

/* ── USER PICKER ─────────────────────────────────────────── */
.user-pick-list{max-height:240px;overflow-y:auto;margin-bottom:10px;}
.upi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition);}
.upi:hover{background:var(--surface2);}
.upi.selected{background:var(--glow2);border:1px solid var(--accent);}
.upi-name{font-size:13px;font-weight:600;color:var(--text-muted);}
.upi-role{font-family:var(--mono);font-size:9px;color:var(--text-dim);}

/* ── PROFILE ─────────────────────────────────────────────── */
.pfp-wrap{position:relative;width:72px;height:72px;margin:0 auto 12px;cursor:pointer;}
.pfp-wrap img,.pfp-inner{width:72px;height:72px;border-radius:50%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:24px;font-weight:700;}
.pfp-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--transition);font-size:20px;}
.pfp-wrap:hover .pfp-overlay{opacity:1;}
.pfp-wrap:hover img,.pfp-wrap:hover .pfp-inner{transform:scale(1.05);transition:transform var(--spring);}

/* ── NOTIFICATION TOAST ──────────────────────────────────── */
.toast{
  position:fixed;top:70px;right:20px;z-index:9000;
  background:var(--glass2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-radius:var(--radius);padding:14px 16px;max-width:320px;
  box-shadow:var(--shadow),0 0 20px var(--glow2);
  animation:slideInRight 0.3s cubic-bezier(0.34,1.56,0.64,1);
  border-left:3px solid var(--accent);
}

/* ── LOCKOUT ─────────────────────────────────────────────── */
#_lockoutOverlay{
  position:fixed;inset:0;background:rgba(5,5,8,0.97);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  animation:fadeIn 0.3s ease;
}

/* ── DEBUG HUD ───────────────────────────────────────────── */
#debugHud{
  position:fixed;bottom:20px;right:20px;
  background:var(--glass2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(248,81,73,0.3);border-radius:var(--radius);
  padding:14px 16px;z-index:900;min-width:220px;
  box-shadow:0 0 20px rgba(248,81,73,0.1);display:none;
  animation:slideInRight 0.3s ease;
}

/* ── TICKET CHAT ─────────────────────────────────────────── */
.ticket-chat-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:14px;}
.ticket-chat-header{background:var(--surface2);padding:8px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;border-bottom:1px solid var(--border);}
.ticket-chat-messages{height:200px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;background:var(--bg);}
.tchat-msg{display:flex;gap:8px;align-items:flex-start;animation:msgIn 0.2s ease;}
.tchat-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;flex-shrink:0;}
.tchat-body{flex:1;}
.tchat-meta{display:flex;gap:8px;align-items:baseline;margin-bottom:2px;}
.tchat-author{font-size:12px;font-weight:700;}
.tchat-time{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
.tchat-text{font-size:13px;color:var(--text-muted);line-height:1.4;word-break:break-word;}
.ticket-chat-input{display:flex;gap:8px;padding:8px 10px;border-top:1px solid var(--border);background:var(--surface);}
.ticket-chat-input input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--ui);font-size:13px;padding:7px 10px;outline:none;transition:all var(--transition);}
.ticket-chat-input input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow2);}
.ticket-chat-input button{background:var(--grad);border:none;color:#fff;font-family:var(--ui);font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
.ticket-chat-input button:hover{transform:translateY(-1px);box-shadow:0 4px 12px var(--glow);}

@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* ── MOBILE ──────────────────────────────────────────────── */
@media (max-width: 768px) {

  /* Topbar */
  .topbar { padding: 0 10px; gap: 6px; }
  .logo { font-size: 14px; letter-spacing: 4px; }
  .topbar-left span:last-child { display: none; }
  .username-display { display: none; }
  #topRoleBadge { display: none !important; }
  .btn-top { padding: 5px 8px; font-size: 11px; letter-spacing: 0; }
  .btn-dashboard { display: none !important; }
  #voiceModeTag { display: none !important; }
  .theme-btn { padding: 5px 8px; font-size: 11px; }
  .theme-picker { right: 0; min-width: 160px; }

  /* Layout */
  .chat-layout { position: relative; }

  /* Left panel — hidden by default on mobile, slides in */
  .left-panel {
    position: fixed; left: 0; top: 52px; bottom: 0;
    z-index: 200; transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    width: 260px;
  }
  .left-panel.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.5); }

  /* Right panel — hide on mobile */
  .right-panel { display: none; }

  /* Center takes full width */
  .center-panel { width: 100%; }

  /* Messages */
  .msg-group { padding: 3px 10px; }
  .msg-actions { right: 10px; }
  .input-row { padding: 8px 10px; gap: 6px; }
  .input-hint { padding: 0 10px 6px; font-size: 8px; }

  /* Chan header */
  .chan-header { padding: 0 10px; }
  .chan-header-desc { display: none; }

  /* Overlay when sidebar open */
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 199;
    top: 52px;
  }
  .sidebar-overlay.open { display: block; }

  /* Mobile menu button */
  .mobile-menu-btn {
    display: flex !important;
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); font-size: 16px;
    width: 32px; height: 32px; align-items: center; justify-content: center;
    border-radius: var(--radius-sm); cursor: pointer; flex-shrink: 0;
    transition: all var(--transition);
  }
  .mobile-menu-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* Forms */
  .form-input, .form-select, .form-textarea { font-size: 16px; } /* Prevent iOS zoom */
  input, textarea { font-size: 16px; }

  /* Modal */
  .modal { margin: 16px; max-width: calc(100vw - 32px); padding: 20px; }
}

@media (min-width: 769px) {
  .mobile-menu-btn { display: none !important; }
  .sidebar-overlay { display: none !important; }
}
.og-badge{
  display:inline-flex;align-items:center;gap:2px;
  font-family:var(--mono);font-size:8px;letter-spacing:1px;
  padding:1px 6px;border-radius:20px;text-transform:uppercase;
  background:rgba(255,215,0,0.12);color:#ffd700;
  border:1px solid rgba(255,215,0,0.3);
  vertical-align:middle;margin-left:2px;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="logo">NOVA</span>
    <span style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim)">chat</span>
  </div>
  <div class="topbar-right" style="position:relative">
    <span id="voiceModeTag" style="display:none"></span>
    <button class="theme-btn" id="themeBtn" onclick="toggleThemePicker(event)">🎨 Theme</button>
    <div class="theme-picker" id="themePicker">
      <div class="theme-option" data-theme="midnight"><div class="theme-swatch" style="background:linear-gradient(135deg,#7c3aed,#a855f7)"></div>Midnight</div>
      <div class="theme-option" data-theme="neon"><div class="theme-swatch" style="background:linear-gradient(135deg,#00f5d4,#7b2ff7)"></div>Neon</div>
      <div class="theme-option" data-theme="ocean"><div class="theme-swatch" style="background:linear-gradient(135deg,#0ea5e9,#075985)"></div>Ocean</div>
      <div class="theme-option" data-theme="forest"><div class="theme-swatch" style="background:linear-gradient(135deg,#22c55e,#d97706)"></div>Forest</div>
      <div class="theme-option" data-theme="sunset"><div class="theme-swatch" style="background:linear-gradient(135deg,#f97316,#8b5cf6)"></div>Sunset</div>
      <div class="theme-option" data-theme="light"><div class="theme-swatch" style="background:linear-gradient(135deg,#6d28d9,#8b5cf6);border:1px solid #e2e8f0"></div>Light</div>
    </div>
    <div class="user-info" onclick="openProfile()">
      <div class="avatar av-user" id="topAv">
        <span id="topAvInitial">?</span>
        <div class="ping-badge" id="pingBadge" style="display:none">0</div>
      </div>
      <div>
        <div class="username-display" id="topUsername">...</div>
        <div style="margin-top:1px"><span class="role-badge" id="topRoleBadge" style="display:none"></span></div>
      </div>
    </div>
    <button class="btn-top btn-dashboard" id="dashBtn" style="display:none" onclick="goToDashboard()">⚙ Dashboard</button>
    <button class="btn-top" onclick="window.location.href='arcade.html'" style="background:var(--glow2);border-color:var(--accent);color:var(--accent2)">🕹 Arcade</button>
    <button class="btn-top btn-ticket" onclick="openSubmitTicket()">🎫 Ticket</button>
    <button class="btn-top" onclick="doSignOut()">Sign Out</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="chat-layout">
  <div class="left-panel" id="leftPanel"></div>
  <div class="center-panel">
    <div class="chan-header" id="chanHeader">
      <span class="chan-header-icon" id="chanIcon">#</span>
      <span class="chan-header-name" id="chanName">Select a channel</span>
      <span class="chan-header-desc" id="chanDesc"></span>
      <span class="chan-readonly-tag" id="chanReadonlyTag" style="display:none">READ ONLY</span>
    </div>
    <div class="messages-area" id="messagesArea">
      <div class="empty-chat"><div class="empty-icon">💬</div><div>Select a channel to start</div></div>
    </div>
    <div id="inputWrap"></div>
  </div>
  <div class="right-panel">
    <div class="right-section">
      <div class="right-label">Members <span id="memberCount" style="color:var(--text-dim)">0</span></div>
      <div id="memberList"></div>
    </div>
    <div class="right-section" id="voiceSection">
      <div class="right-label">Voice</div>
      <div id="voiceRoomList"></div>
    </div>
  </div>
</div>

<div id="modalContainer"></div>
<input type="file" id="pfpInput" accept="image/*" style="display:none" onchange="handlePfpUpload(event)">

<!-- DEBUG HUD -->
<div id="debugHud">
  <div style="font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--danger);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(248,81,73,0.2)">▸ Debug HUD</div>
  <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-family:var(--mono);font-size:11px"><span style="color:var(--text-dim)">REAL ROLE</span><span id="hudRealRole" style="color:var(--text-muted)">—</span></div>
  <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-family:var(--mono);font-size:11px"><span style="color:var(--text-dim)">SIM ROLE</span><span id="hudSimRole" style="color:var(--text-muted)">—</span></div>
  <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-family:var(--mono);font-size:11px"><span style="color:var(--text-dim)">DEBUG</span><span style="color:var(--danger)">on</span></div>
  <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-family:var(--mono);font-size:11px"><span style="color:var(--text-dim)">USER</span><span id="hudEmail" style="color:var(--text-muted);max-width:130px;overflow:hidden;text-overflow:ellipsis">—</span></div>
  <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px">Simulate Role</div>
  <select id="roleSimSelect" onchange="applySimRole(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;outline:none">
    <option value="">None (real role)</option>

window.setTheme = function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);

    el.classList.toggle('active', el.dataset.theme === theme);
  });
  document.getElementById('themePicker').classList.remove('open');
  if (ME) {
    updateDoc(doc(db,'users',ME.uid), { theme }).catch(()=>{});

}

window.toggleThemePicker = function(e) {
  e.stopPropagation();

};

  const option = e.target.closest('.theme-option');

// ── PROFILE WATCHER ───────────────────────────────────────
function watchMyProfile() {
  onSnapshot(doc(db,'users',ME.uid), async snap => {
    if (!snap.exists()) return;
    const data = snap.data();
    const now = Date.now();
    if (data.banned && !ME.banned) { ME.banned=true; await leaveVoice(); showLockoutOverlay('⛔','ACCOUNT BANNED','Your account has been permanently banned.'); return; }
    const tempUntil = data.tempBannedUntil ? (data.tempBannedUntil.seconds?data.tempBannedUntil.seconds*1000:new Date(data.tempBannedUntil).getTime()) : 0;
    if (tempUntil > now && !ME._tempBanNotified) { ME._tempBanNotified=true; await leaveVoice(); showLockoutOverlay('🚫','TEMPORARILY BANNED',`Banned until ${new Date(tempUntil).toLocaleString()}.`); return; }
    if (tempUntil && tempUntil <= now) ME._tempBanNotified = false;
    const pending = data.pendingNotifications||[];
    if (pending.length > 0) {
      for (const n of pending) showModerationNotification(n);
      await updateDoc(doc(db,'users',ME.uid),{pendingNotifications:[]});
    }
    ME.pingCount=data.pingCount||0; ME.mutedUntil=data.mutedUntil; ME.banned=data.banned; ME.rulesAccepted=data.rulesAccepted||false;
    ME.pfp=data.pfp||''; ME.username=data.username||ME.email.split('@')[0];
    if (currentChan) renderInput(currentChan.type==='group');
    const badge = document.getElementById('pingBadge');
    if (badge) { if(ME.pingCount>0){badge.style.display='flex';badge.textContent=ME.pingCount>99?'99+':ME.pingCount;}else badge.style.display='none'; }
  });
}

// ── BUILD LEFT PANEL ──────────────────────────────────────
async function buildLeft() {
  await ensureChannels();
  const chanSnap = await getDocs(collection(db,'channels'));
  const chans = chanSnap.docs.map(d=>({id:d.id,...d.data()}))
    .filter(c=>c.id!=='devalerts')
    .sort((a,b)=>{
      const ord=['updates','general','staff','mod'];
      const ai=ord.indexOf(a.id),bi=ord.indexOf(b.id);
      if(ai!==-1&&bi!==-1)return ai-bi;if(ai!==-1)return-1;if(bi!==-1)return 1;
      return(a.createdAt||0)-(b.createdAt||0);
    });
  let html=`<div class="left-section"><div class="left-label">Channels</div>`;
  chans.forEach((c,i)=>{
    const access=c.access||(c.restricted?'staff':'all');
    if(access==='staff'&&!['Owner','Staff'].includes(effectiveRole()))return;
    if(access==='mod'&&!['Owner','Mod'].includes(effectiveRole()))return;
    if(c.restricted&&!['Owner','Mod','Staff'].includes(effectiveRole()))return;
    const icon=c.id==='updates'?'📢':c.id==='mod'?'🛡':c.id==='staff'?'⚡':'#';
    html+=`<div class="chan-item" id="ci-${c.id}" onclick="openChannel('${c.id}')" style="animation-delay:${i*0.04}s"><span class="chan-icon">${icon}</span><span class="chan-name">${esc(c.name||c.id)}</span></div>`;
  });
  html+=`</div><div class="left-section"><div class="left-label">Voice</div>`;
  VOICE_ROOMS.forEach((vr,i)=>{
    if(vr.restricted&&!['Owner','Mod','Staff'].includes(effectiveRole()))return;
    html+=`<div class="voice-item" id="vi-${vr.id}" onclick="joinVoice('${vr.id}','${vr.name}')" style="animation-delay:${(i+5)*0.04}s">
      <div class="voice-item-row"><span class="voice-item-icon">🔊</span><span class="voice-item-name">${vr.name}</span><span class="voice-item-count" id="vpc-${vr.id}"></span></div>
      <div class="voice-part-list" id="vp-${vr.id}"></div>
    </div>`;
  });
  html+=`</div>
  <div class="left-section"><div class="left-label">Direct Messages <button class="left-label-btn" onclick="openDMPicker()">+</button></div><div id="dmList"></div></div>
  <div class="left-section"><div class="left-label">Groups <button class="left-label-btn" onclick="openGroupCreator()">+</button></div><div id="groupList"></div></div>
  <div class="left-section"><div class="left-label">My Tickets</div><div id="ticketList"></div></div>`;
  document.getElementById('leftPanel').innerHTML=html;
  await loadDMList(); await loadGroupList(); await loadMyTickets();
  watchVoicePresence();
  openChannel('general');
}

async function ensureChannels() {
  for(const ch of [
    {id:'general',name:'general',desc:'General discussion',restricted:false,readonly:false,access:'all'},
    {id:'updates',name:'updates',desc:'System updates & announcements',restricted:false,readonly:true,access:'all'},
    {id:'staff',  name:'staff',  desc:'Staff team channel',restricted:true,readonly:false,access:'staff'},
    {id:'mod',    name:'mod',    desc:'Mod team channel',restricted:true,readonly:false,access:'mod'},
    {id:'rules',  name:'rules',  desc:'Read the rules before chatting',restricted:false,readonly:true,access:'all'},
  ]){
    const s=await getDoc(doc(db,'channels',ch.id));
    if(!s.exists()) await setDoc(doc(db,'channels',ch.id),{...ch,createdAt:Date.now()});
    else await setDoc(doc(db,'channels',ch.id),{...ch,createdAt:s.data().createdAt||Date.now()},{merge:true});
  }
}

};

window.sendMsg = async function(){
  const ta=document.getElementById('msgInput');if(!ta)return;
  const text=ta.value.trim();if(!text)return;
  ta.value='';ta.style.height='';
  const msgData={
    text,senderUid:ME.uid,senderEmail:ME.email,
    senderUsername:ME.username||ME.email,
    senderRole:ME.role,senderPfp:ME.pfp||'',
    og:ME.og||false,
    timestamp:Date.now(),system:false,
    replyTo:replyTo?{id:replyTo.id,author:replyTo.author,text:replyTo.text.slice(0,80)}:null,
  };
  replyTo=null;
  let colRef;
  if(currentChan.type==='channel')     colRef=collection(db,'channels',currentChan.id,'messages');
  else if(currentChan.type==='dm')     colRef=collection(db,'dms',currentChan.id,'messages');
  else if(currentChan.type==='group')  colRef=collection(db,'groups',currentChan.id,'messages');
  else if(currentChan.type==='ticket') { await sendTicketUserMsg2(currentChan.id,text); return; }
  if(!colRef)return;
  await addDoc(colRef,msgData);
  const everyone=text.toLowerCase().includes('@everyone')&&effectiveRole()==='Owner';
  if(everyone){
    const usersSnap=await getDocs(collection(db,'users'));
    for(const d of usersSnap.docs)if(d.id!==ME.uid)await updateDoc(doc(db,'users',d.id),{pingCount:increment(1)});
  }else{
    const rx=/@(\w+)/g;let m;
    while((m=rx.exec(text))!==null){
      const h=m[1].toLowerCase();
      const target=Object.values(allUsers).find(u=>(u.username||u.email||'').toLowerCase().startsWith(h));
      if(target&&target.uid!==ME.uid)await updateDoc(doc(db,'users',target.uid),{pingCount:increment(1)});
    }
  }
};

let _lastMsgSender = null;

function renderMsgs(docs){
  const area=document.getElementById('messagesArea');
  if(!docs.length){area.innerHTML=`<div class="empty-chat"><div class="empty-icon">💬</div><div>No messages yet</div></div>`;return;}
  const atBottom=area.scrollHeight-area.clientHeight-area.scrollTop<80;
  let html='';let lastDate='';let prevSender=null;let prevTime=0;
  docs.forEach((d,idx)=>{
    const msg=d.data();const mid=d.id;
    const ms=msg.timestamp?(msg.timestamp.seconds?msg.timestamp.seconds*1000:msg.timestamp):Date.now();
    const ds=new Date(ms).toLocaleDateString();
    if(ds!==lastDate){html+=`<div class="date-div">${ds}</div>`;lastDate=ds;prevSender=null;}
    const ts=new Date(ms).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const role=msg.senderRole||'User';
    const rc=role==='Owner'?'owner':role==='Mod'?'mod':role==='Staff'?'staff':'user';
    const init=(msg.senderUsername||msg.senderEmail||'?')[0].toUpperCase();
    const isMe=msg.senderUid===ME.uid;
    const myHandle=(ME.username||ME.email||'').toLowerCase();
    const pinged=msg.text&&(msg.text.toLowerCase().includes('@'+myHandle)||msg.text.toLowerCase().includes('@everyone'));
    const canDel=isMe||effectiveRole()==='Owner'||effectiveRole()==='Mod';
    const delBtn=canDel&&!msg.system?`<button class="mab danger" onclick="deleteMsg('${mid}')">Delete</button>`:'';
    const replyBtn=!msg.system?`<button class="mab" onclick="setReply('${mid}','${escAttr(msg.senderUsername||msg.senderEmail)}','${escAttr((msg.text||'').slice(0,80))}')">Reply</button>`:'';
    // Stacking — same sender within 5 minutes
    const isStacked = !msg.system && prevSender===msg.senderUid && !msg.replyTo && (ms-prevTime)<300000;
    if(!msg.system){prevSender=msg.senderUid;prevTime=ms;}else{prevSender=null;}
    let rq='';
    if(msg.replyTo){rq=`<div class="reply-quote" onclick="scrollToMsg('${msg.replyTo.id}')"><span class="reply-quote-author">${esc(msg.replyTo.author)}</span>${esc(msg.replyTo.text)}</div>`;}
    let txt=esc(msg.text||'');
    txt=txt.replace(/@everyone/gi,`<span class="mention-everyone">@everyone</span>`);
    txt=txt.replace(/@(\w+)/g,(m,h)=>`<span class="mention">${m}</span>`);
    txt=txt.replace(/\n/g,'<br>');
    if(msg.system){
      html+=`<div class="msg-group" id="msg-${mid}" style="animation-delay:${idx*0.015}s">
        <div style="width:34px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px;opacity:0.6">⚙</div>
        <div class="msg-body"><div class="msg-text system-msg">${txt}</div></div>
        <div class="msg-actions">${delBtn}</div>
      </div>`;
    }else{
      const avHtml=msg.senderPfp?`<img src="${msg.senderPfp}">`:`<div class="msg-av-inner ${avCls(role)}">${init}</div>`;
      html+=`<div class="msg-group${isStacked?' stacked':''}${pinged?' pinged':''}" id="msg-${mid}" style="animation-delay:${idx*0.015}s">
        <div class="msg-av-wrap ${avCls(role)}">${avHtml}</div>
        <div class="msg-body">
          ${rq}
          ${!isStacked?`<div class="msg-meta"><span class="msg-author ${rc}">${esc(msg.senderUsername||msg.senderEmail||'?')}</span>${roleMsgTag(role)}${msg.og?'<span class="og-badge">🌟 OG</span>':''}<span class="msg-time">${ts}</span></div>`:`<span class="msg-time" style="font-size:9px;color:var(--text-dim);position:absolute;left:-28px;top:3px;opacity:0;transition:opacity 0.2s" class="hover-time">${ts}</span>`}
          <div class="msg-text">${txt}</div>
        </div>
        <div class="msg-actions">${replyBtn}${delBtn}</div>
      </div>`;
    }
  });
  area.innerHTML=html;
  if(atBottom)area.scrollTop=area.scrollHeight;
}

// ── PRESENCE SYSTEM ───────────────────────────────────────
// States: online (active <2min), away (tab hidden), offline (>2min or closed)
let _presenceData = {}; // uid -> status string

function initPresence() {
  if (!ME) return;
  const ref = doc(db, 'presence', ME.uid);

  // Write our status every 10 seconds.
  // online  = this tab is visible
  // away    = a nova tab is open but not focused
  // offline = no nova tab (handled by lastSeen expiry — if no write for >15s, treated as offline)
  async function tick() {
    const status = document.visibilityState === 'visible' ? 'online' : 'away';
    try {
      await setDoc(ref, { status, lastSeen: Date.now(), uid: ME.uid }, { merge: true });
    } catch(_) {}
  }

  tick(); // immediate write on load
  setInterval(tick, 10000); // then every 10s

  // Watch all presence docs live
  onSnapshot(collection(db, 'presence'), snap => {
    const now = Date.now();
    snap.docs.forEach(d => {
      const p = d.data();
      // If lastSeen is older than 15s, the tab is closed — treat as offline
      const stale = (now - (p.lastSeen || 0)) > 15000;
      _presenceData[d.id] = stale ? 'offline' : (p.status || 'offline');
    });
    updateMembers();
  });
}

function getPresence(uid) {
  return _presenceData[uid] || 'offline';
}

function memberRow(u, showPresenceDot=true){
  if(!u)return'';
  if(u.banned)return'';
  const r=u.role||'User';const uname=u.username||u.email||'?';
  const now=Date.now();
  const mutedUntil=u.mutedUntil?(u.mutedUntil.seconds?u.mutedUntil.seconds*1000:new Date(u.mutedUntil).getTime()):0;
  const isMuted=mutedUntil>now;
  const tempUntil=u.tempBannedUntil?(u.tempBannedUntil.seconds?u.tempBannedUntil.seconds*1000:new Date(u.tempBannedUntil).getTime()):0;
  const isTempBanned=tempUntil>now;
  const avHtml=u.pfp?`<img src="${u.pfp}">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--mono);font-weight:700">${uname[0].toUpperCase()}</div>`;
  const presence=getPresence(u.uid);

  let right='';
  let nameStyle='';
  if(isTempBanned){
    right=`<span style="font-family:var(--mono);font-size:8px;color:var(--danger);background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.25);padding:1px 5px;border-radius:8px;flex-shrink:0">BANNED</span>`;
    nameStyle='opacity:0.5;';
  } else if(isMuted){
    right=`<span style="font-size:11px;flex-shrink:0" title="Muted">🔇</span>`;
    nameStyle='opacity:0.6;';
  } else if(showPresenceDot){
    right=`<span class="presence-dot ${presence}" title="${presence.charAt(0).toUpperCase()+presence.slice(1)}"></span>`;
  }

  const dimmed=presence==='offline'&&!isTempBanned&&!isMuted?'opacity:0.45;':'';
  return`<div class="member-item" style="${dimmed}"><div class="member-av ${avCls(r)}" style="${isMuted||isTempBanned?'opacity:0.5;':''}">${avHtml}</div><span class="member-name" style="${nameStyle}">${esc(uname)}</span>${right}</div>`;
}

function updateMembers(){
  const all=Object.values(allUsers);
  const visible=all.filter(u=>!u.banned);
  const filtered=currentChan?.data?.restricted?visible.filter(u=>['Owner','Mod','Staff'].includes(u.role)):visible;
  const ord=['Owner','Mod','Staff','User'];

  // Split by presence
  const online=filtered.filter(u=>getPresence(u.uid)==='online');
  const away=filtered.filter(u=>getPresence(u.uid)==='away');
  const offline=filtered.filter(u=>getPresence(u.uid)==='offline');

  // Sort each group by role
  const byRole=(a,b)=>ord.indexOf(a.role||'User')-ord.indexOf(b.role||'User');
  online.sort(byRole);away.sort(byRole);offline.sort(byRole);

  const onlineCount=online.length+away.length;
  document.getElementById('memberCount').textContent=filtered.length;

  let html='';
  if(online.length){
    html+=`<div class="pgroup-label">Online — ${online.length}</div>`;
    html+=online.map(u=>memberRow(u)).join('');
  }
  if(away.length){
    html+=`<div class="pgroup-label">Away — ${away.length}</div>`;
    html+=away.map(u=>memberRow(u)).join('');
  }
  if(offline.length){
    html+=`<div class="pgroup-label">Offline — ${offline.length}</div>`;
    html+=offline.map(u=>memberRow(u)).join('');
  }

  document.getElementById('memberList').innerHTML=html;
}

// ── MY TICKETS ────────────────────────────────────────────
window._loadMyTickets = loadMyTickets;
async function loadMyTickets() {
  ticketUnsubscribers.forEach(u=>u()); ticketUnsubscribers=[];
  const container=document.getElementById('ticketList');
  if(!container)return;
  let allDocs=[];
  try {
    const q1=await getDocs(query(collection(db,'tickets'),where('createdByUid','==',ME.uid)));
    const q2=await getDocs(query(collection(db,'tickets'),where('assignedTo','==',ME.email)));
    const seen=new Set();
    [...q1.docs,...q2.docs].forEach(d=>{ if(!seen.has(d.id)){seen.add(d.id);allDocs.push(d);} });
  } catch(e) {
    console.warn('[NOVA] loadMyTickets error:',e.message);
    container.innerHTML='<div style="padding:4px 12px;font-size:11px;color:var(--text-dim)">—</div>';
    return;
  }
  // Filter out tickets escalated away from this role
  const myTickets = allDocs.filter(d => {
    const t = d.data();
    const el = t.escalationLevel || 'none';
    // Staff: hide tickets escalated to Mod or Owner
    if (effectiveRole() === 'Staff' && (el === 'staff_to_mod' || el === 'mod_to_owner')) return false;
    // Mod: hide tickets escalated to Owner
    if (effectiveRole() === 'Mod' && el === 'mod_to_owner') return false;
    return true;
  });
  const visible=myTickets.filter(d=>d.data().status!=='closed');
  if(!visible.length){container.innerHTML='<div style="padding:4px 12px;font-size:11px;color:var(--text-dim)">No open tickets</div>';return;}
  let html='';
  visible.forEach(d=>{
    const t=d.data();const tid=d.id;
    const sp=t.status==='in_progress'?'var(--warn)':'var(--success)';
    html+=`<div class="chan-item" id="ci-tkt-${tid}" onclick="openTicketChat('${tid}')">
      <span class="chan-icon" style="color:${sp}">🎫</span>
      <span class="chan-name">${esc(t.subject||'Ticket')}</span>
      <span id="tkt-unread-${tid}" style="display:none;background:var(--danger);color:#fff;font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:8px;flex-shrink:0;animation:ping 1s ease infinite">!</span>
    </div>`;
  });
  container.innerHTML=html;
  visible.forEach(d=>watchTicketUnread(d.id));
}

function watchTicketUnread(ticketId){
  if(!window._ticketLastRead)window._ticketLastRead={};
  if(!window._ticketLastRead[ticketId])window._ticketLastRead[ticketId]=Date.now();
  const unsub=onSnapshot(doc(db,'tickets',ticketId),snap=>{
    if(!snap.exists())return;
    const t=snap.data();
    const badge=document.getElementById('tkt-unread-'+ticketId);
    if(t.status==='closed'){const item=document.getElementById('ci-tkt-'+ticketId);if(item)item.remove();return;}
    const lastReply=t.lastStaffReply||0;
    const lastRead=window._ticketLastRead[ticketId]||0;
    if(currentChan&&currentChan.type==='ticket'&&currentChan.id===ticketId){
      window._ticketLastRead[ticketId]=Date.now();
      if(badge)badge.style.display='none';
      document.getElementById('chanDesc').textContent='— '+(t.status||'open')+' · '+(t.assignedTo||'awaiting staff');
    }else if(lastReply>lastRead){if(badge)badge.style.display='';}
    else{if(badge)badge.style.display='none';}
  });
  ticketUnsubscribers.push(unsub);
}

window.openTicketChat=async function(ticketId){
  setActive('ci-tkt-'+ticketId);
  closeSidebarOnMobile();
  if(msgUnsub){msgUnsub();msgUnsub=null;}
  replyTo=null;
  const snap=await getDoc(doc(db,'tickets',ticketId));
  if(!snap.exists())return;
  const t=snap.data();
  currentChan={id:ticketId,data:{name:t.subject,isTicket:true},type:'ticket'};
  if(!window._ticketLastRead)window._ticketLastRead={};
  window._ticketLastRead[ticketId]=Date.now();
  const badge=document.getElementById('tkt-unread-'+ticketId);if(badge)badge.style.display='none';
  document.getElementById('chanIcon').textContent='🎫';
  document.getElementById('chanName').textContent=t.subject||'Ticket';
  document.getElementById('chanDesc').textContent='— '+(t.status||'open')+' · '+(t.assignedTo||'awaiting staff');
  document.getElementById('chanReadonlyTag').style.display='none';
  const iw=document.getElementById('inputWrap');
  iw.innerHTML=`<div class="input-wrap"><div class="input-row"><div class="input-box"><textarea id="msgInput" placeholder="Message about your ticket..." rows="1"></textarea></div><button class="btn-send" onclick="sendMsg()">SEND</button></div><div class="input-hint">Enter to send · Shift+Enter new line</div></div>`;
  attachInput();
  const assignedUser=Object.values(allUsers).find(u=>u.email===t.assignedTo);
  document.getElementById('memberCount').textContent=t.assignedTo?2:1;
  document.getElementById('memberList').innerHTML=memberRow(ME)+(assignedUser?memberRow(assignedUser):'');
  showSkeletonLoader();
  const q=query(collection(db,'tickets',ticketId,'chat'),orderBy('timestamp','asc'),limit(100));
  msgUnsub=onSnapshot(q,snap=>renderMsgs(snap.docs),err=>{
    console.warn('[NOVA] ticket chat error:',err.message);
    // Fallback without orderBy if index missing
    const q2=query(collection(db,'tickets',ticketId,'chat'),limit(100));
    msgUnsub=onSnapshot(q2,snap=>{
      const sorted=[...snap.docs].sort((a,b)=>(a.data().timestamp||0)-(b.data().timestamp||0));
      renderMsgs(sorted);
    });
  });
};

// ── VOICE ─────────────────────────────────────────────────
function watchVoicePresence(){
  VOICE_ROOMS.forEach(vr=>{
    onSnapshot(collection(db,'voiceRooms',vr.id,'participants'),snap=>{
      const parts=snap.docs.map(d=>d.data());
      const cnt=document.getElementById('vpc-'+vr.id);
      const plist=document.getElementById('vp-'+vr.id);
      const item=document.getElementById('vi-'+vr.id);
      if(cnt)cnt.textContent=parts.length?`${parts.length}`:'';
      if(plist)plist.innerHTML=parts.map(p=>`<div class="voice-part"><span>${esc(p.username||p.email||'?')}</span>${p.muted?'<span style="font-size:9px;color:var(--danger)">🔇</span>':''}</div>`).join('');
      if(item)item.classList.toggle('in-room',parts.some(p=>p.uid===ME.uid));
    });
  });
}

window.joinVoice=async function(roomId,roomName){
  if(currentVoiceRoom===roomId){await leaveVoice();return;}
  if(currentVoiceRoom)await leaveVoice();
  await setDoc(doc(db,'voiceRooms',roomId,'participants',ME.uid),{uid:ME.uid,email:ME.email,username:ME.username||ME.email,muted:false,joinedAt:Date.now()});
  currentVoiceRoom=roomId;
  document.getElementById('voiceSection').innerHTML=`
    <div class="right-label">Voice — Active</div>
    <div class="voice-active-box">
      <div class="vab-header"><span class="vab-name">🔊 ${esc(roomName)}</span>
        <div class="vab-btns">
          <button class="vab-btn" id="muteBtn" onclick="toggleMute()">🎙 Live</button>
          <button class="vab-btn leave-btn" onclick="leaveVoice()">Leave</button>
        </div>
      </div>
    </div>`;
  if(voiceMode==='agora')await joinAgora(roomId);else await joinWebRTC(roomId);
};

async function joinAgora(roomId){
  try{
    const uidNum=Math.abs(ME.uid.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%100000;
    const res=await fetch(`https://nova-token-server.vercel.app/api/token?channel=${roomId}&uid=${uidNum}`);
    const data=await res.json();
    if(!data.token)throw new Error('No token');
    agoraClient=AgoraRTC.createClient({mode:'rtc',codec:'vp8'});
    await agoraClient.join(AGORA_APP_ID,roomId,data.token,uidNum);
    agoraLocalTrack=await AgoraRTC.createMicrophoneAudioTrack();
    await agoraClient.publish([agoraLocalTrack]);
    agoraClient.on('user-published',async(u,mt)=>{await agoraClient.subscribe(u,mt);if(mt==='audio')u.audioTrack.play();});
  }catch(e){console.warn('[NOVA] Agora failed:',e.message);await joinWebRTC(roomId);}
}

async function joinWebRTC(roomId){
  const snap=await getDocs(collection(db,'voiceRooms',roomId,'participants'));
  if(snap.size>6){alert('Room full (WebRTC mode — max 6).');await leaveVoice();return;}
  try{window._localStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){alert('Mic access denied: '+e.message);await leaveVoice();}
}

window.toggleMute=async function(){
  isMuted=!isMuted;
  const btn=document.getElementById('muteBtn');
  if(btn){btn.textContent=isMuted?'🔇 Muted':'🎙 Live';btn.classList.toggle('muted-state',isMuted);}
  if(agoraLocalTrack)await agoraLocalTrack.setMuted(isMuted);
  if(window._localStream)window._localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  if(currentVoiceRoom)await updateDoc(doc(db,'voiceRooms',currentVoiceRoom,'participants',ME.uid),{muted:isMuted});
};

window.leaveVoice=async function(){
  if(!currentVoiceRoom)return;
  try{await deleteDoc(doc(db,'voiceRooms',currentVoiceRoom,'participants',ME.uid));}catch(_){}
  if(agoraLocalTrack){agoraLocalTrack.close();agoraLocalTrack=null;}
  if(agoraClient){try{await agoraClient.leave();}catch(_){}agoraClient=null;}
  if(window._localStream){window._localStream.getTracks().forEach(t=>t.stop());window._localStream=null;}
  currentVoiceRoom=null;isMuted=false;
  document.getElementById('voiceSection').innerHTML=`<div class="right-label">Voice</div><div id="voiceRoomList"></div>`;
  watchVoicePresence();
};

window.startDMCall=function(){if(!currentChan||currentChan.type!=='dm')return;joinVoice('dmcall-'+[ME.uid,currentChan.data.otherUid].sort().join('-'),'DM Call');};
window.startGroupCall=function(){if(!currentChan||currentChan.type!=='group')return;joinVoice('grpcall-'+currentChan.id,(currentChan.data.name||'Group')+' Call');};

window.handlePfpUpload=async function(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>3*1024*1024){alert('Image must be under 3MB.');return;}
  const reader=new FileReader();
  reader.onload=async ev=>{
    const url=ev.target.result;ME.pfp=url;
    try{await updateDoc(doc(db,'users',ME.uid),{pfp:url});}catch(_){}
    setupTopbar();closeModal();openProfile();
  };
  reader.readAsDataURL(file);
};

window.saveProfile=async function(){
  const nu=document.getElementById('pUser').value.trim();
  if(!nu){alert('Username cannot be empty.');return;}
  ME.username=nu;
  await updateDoc(doc(db,'users',ME.uid),{username:nu});
  setupTopbar();closeModal();
};

// ── DEBUG HUD ─────────────────────────────────────────────
function updateDebugHud(debugOn){
  const hud=document.getElementById('debugHud');if(!hud)return;
  const canDebug=ME&&(effectiveRole()==='Owner'||effectiveRole()==='Mod');
  hud.style.display=(debugOn&&canDebug)?'block':'none';

// effectiveRole() — use everywhere instead of ME.role directly
// Returns simulated role when debug sim is active, otherwise real role
window.effectiveRole=function(){return _simRole||ME?.role||'User';};

window.applySimRole=function(roleVal){
  _simRole=roleVal||null;
  // Update HUD labels
  const simEl=document.getElementById('hudSimRole');
  if(simEl)simEl.textContent=_simRole?`${_simRole} (simulating)`:'None (real role)';
  const realEl=document.getElementById('hudRealRole');
  if(realEl)realEl.textContent=ME?.role||'—';
  // Rebuild everything that depends on role
  setupTopbar();
  buildLeft();
  renderInput();
  updateMembers();
  // Re-open current channel/DM to reapply access rules
  if(currentChan){
    if(currentChan.type==='channel')openChannel(currentChan.id);
    else if(currentChan.type==='dm')openDM(currentChan.id);
  }
};

// ── MODAL ─────────────────────────────────────────────────
function openModal(html){
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal(){document.getElementById('modalContainer').innerHTML='';}
window.closeModal=closeModal;

// ── MOBILE SIDEBAR ───────────────────────────────────────
window.toggleSidebar = function() {
  const panel   = document.getElementById('leftPanel');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen  = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
};

// Close sidebar when a channel is selected on mobile
function closeSidebarOnMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('leftPanel').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
