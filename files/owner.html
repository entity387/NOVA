function rolePill(r) {
  const map  = { Owner:'pill-owner', Mod:'pill-mod', Staff:'pill-staff', User:'pill-user' };
  const icons= { Owner:'👑 ', Mod:'🛡 ', Staff:'⚡ ', User:'' };
  return `<span class="pill ${map[r]||'pill-user'}">${icons[r]||''}${r}</span>`;
}

// ── LOAD ASSIGNABLE USERS (for ticket assignment) ─────────
async function loadAssignableUsers() {
  const snap = await getDocs(collection(db,'users'));
  // Owner sees Mod + Staff
  return snap.docs
    .map(d => ({ uid:d.id, ...d.data() }))
    .filter(u => u.role==='Mod' || u.role==='Staff')
    .sort((a,b) => {
      if (a.role==='Mod' && b.role!=='Mod') return -1;
      if (b.role==='Mod' && a.role!=='Mod') return 1;
      return (a.username||a.email).localeCompare(b.username||b.email);
    });
}

function buildAssignSelect(assignableUsers, currentAssigned) {
  const opts = assignableUsers.map(u =>
    `<option value="${u.email}" ${currentAssigned===u.email?'selected':''}>${u.username||u.email} [${u.role}]</option>`
  ).join('');
  return `<select class="form-select" id="mAssign">
    <option value="">Unassigned</option>
    <option value="${email}" ${currentAssigned===email?'selected':''}>Myself [Owner]</option>
    ${opts}
  </select>`;
}

    getDocs(query(collection(db,'logs'),orderBy('timestamp','desc'),limit(8))),
    getDocs(query(collection(db,'channels','devalerts','messages'),orderBy('timestamp','desc'),limit(5))),
  ]);

  const mods   = users.filter(u=>u.role==='Mod').length;

  const alertRows = aSnap.docs.map(d=>{const a=d.data();return`<div class="alert-entry"><div class="alert-meta"><span class="alert-sender">${a.sender||'—'}</span><span class="alert-time">${ts(a.timestamp)}</span></div><div class="alert-text">${a.text||''}</div></div>`;}).join('')||'<div class="empty">No alerts</div>';
  document.getElementById('mainContent').innerHTML=`

      <div><div class="section-header"><div class="section-title">Recent Logs</div></div><div class="card" style="padding:0">${logRows}</div></div>
      <div><div class="section-header"><div class="section-title">Mod Alerts</div></div><div class="card" style="padding:0">${alertRows}</div></div>

    const sp = {open:'pill-open',in_progress:'pill-progress',closed:'pill-closed'}[t.status]||'pill-none';
    const ep = {none:'pill-none',staff_to_mod:'pill-s2m',mod_to_owner:'pill-m2o'}[t.escalationLevel]||'pill-none';
    const pp = t.priority==='high'?'<span style="font-family:var(--mono);font-size:9px;background:rgba(248,81,73,0.15);color:var(--danger);padding:1px 6px;border-radius:2px;margin-left:5px">HIGH</span>':t.priority==='medium'?'<span style="font-family:var(--mono);font-size:9px;background:rgba(210,153,34,0.15);color:var(--warn);padding:1px 6px;border-radius:2px;margin-left:5px">MED</span>':'';

      <td><span class="pill ${sp}">${t.status||'—'}</span></td>

      <td>
        <div class="flex-gap-sm">

          <button class="btn btn-sm btn-danger" onclick="deleteTicket('${id}')">Del</button>
        </div>

  document.getElementById('mainContent').innerHTML=`

  openModal(`
    <div class="modal-title">Ticket: ${t.subject||'—'}</div>
    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <div>
        <div class="form-group">
          <div class="form-label">Status</div>

            <option value="open"        ${t.status==='open'?'selected':''}>Open</option>
            <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In Progress</option>

        </div>

          <div class="form-label">Assign To</div>

            <option value="none"          ${t.escalationLevel==='none'?'selected':''}>None</option>

            <option value="mod_to_owner"  ${t.escalationLevel==='mod_to_owner'?'selected':''}>Mod → Owner</option>

        </div>

      </div>

        <input id="tchatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendTicketChat('${id}')">
        <button onclick="sendTicketChat('${id}')">Send</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="closeTicket('${id}')">Close &amp; Delete Ticket</button>
      <button class="btn btn-primary" onclick="saveTicket('${id}')">Save Changes</button>
    </div>`, true);

  // Load ticket chat
  loadTicketChat(id);

function loadTicketChat(ticketId) {
  const q = query(collection(db,'tickets',ticketId,'chat'), orderBy('timestamp','asc'));
  const unsub = onSnapshot(q, snap => {
    const el = document.getElementById('tchatMessages');
    if (!el) { unsub(); return; }
    if (!snap.docs.length) {
      el.innerHTML = `<div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center;padding:20px">No messages yet</div>`;
      return;
    }
    el.innerHTML = snap.docs.map(d => {
      const m = d.data();
      const r = m.senderRole||'User';
      const cls = r==='Owner'?'avatar-owner':r==='Mod'?'avatar-mod':r==='Staff'?'avatar-staff':'avatar-user';
      const col = r==='Owner'?'var(--gold)':r==='Mod'?'var(--info)':r==='Staff'?'var(--success)':'var(--text)';
      return `<div class="tchat-msg">
        <div class="tchat-avatar ${cls}">${(m.senderEmail||'?')[0].toUpperCase()}</div>
        <div class="tchat-body">
          <div class="tchat-meta">
            <span class="tchat-author" style="color:${col}">${m.senderEmail||'—'}</span>
            <span class="tchat-time">${ts(m.timestamp)}</span>
          </div>
          <div class="tchat-text">${escHtml(m.text||'')}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

window.sendTicketChat = async function(ticketId) {
  const input = document.getElementById('tchatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await addDoc(collection(db,'tickets',ticketId,'chat'), {
    text, senderUid:uid, senderEmail:email, senderRole:'Owner', timestamp:Date.now()
  });
  try { await updateDoc(doc(db,'tickets',ticketId), { lastStaffReply:Date.now() }); } catch(_) {}
};

window.saveTicket = async function(id) {
  const data = {
    status:           document.getElementById('tStatus').value,
    assignedTo:       document.getElementById('mAssign').value||'',
    escalationLevel:  document.getElementById('tEsc').value,
    escalationReason: document.getElementById('tEscReason').value.trim(),
  };
  await updateDoc(doc(db,'tickets',id), data);
  await writeLog(`Updated ticket ${id}`);
  closeModal(); tickets();
};

window.closeTicket = async function(id) {
  if (!confirm('Close and permanently delete this ticket and its chat?')) return;
  // Delete chat subcollection messages
  const chatSnap = await getDocs(collection(db,'tickets',id,'chat'));
  for (const d of chatSnap.docs) await deleteDoc(d.ref);
  await deleteDoc(doc(db,'tickets',id));
  await writeLog(`Closed & deleted ticket ${id}`);
  closeModal(); tickets();
};

window.deleteTicket = async function(id) {
  if (!confirm('Delete this ticket?')) return;
  const chatSnap = await getDocs(collection(db,'tickets',id,'chat'));
  for (const d of chatSnap.docs) await deleteDoc(d.ref);
  await deleteDoc(doc(db,'tickets',id));
  await writeLog(`Deleted ticket ${id}`);
  tickets();
};

async function users() {
  document.getElementById('mainContent').innerHTML='<div class="empty">Loading...</div>';
  const snap = await getDocs(collection(db,'users'));
  const rows = snap.docs.map(d => {
    const u=d.data(); const uid2=d.id;
    const uname = u.username||u.email||'—';
    const now = Date.now();
    const isTempBanned = u.tempBannedUntil && (u.tempBannedUntil.seconds ? u.tempBannedUntil.seconds*1000 : new Date(u.tempBannedUntil).getTime()) > now;
    const isMuted = u.mutedUntil && (u.mutedUntil.seconds ? u.mutedUntil.seconds*1000 : new Date(u.mutedUntil).getTime()) > now;
    let statusPill = '<span class="pill pill-none">Active</span>';
    if (u.banned) statusPill = '<span class="pill pill-banned">Banned</span>';
    else if (isTempBanned) statusPill = '<span class="pill pill-tempban">Temp Banned</span>';
    else if (isMuted) statusPill = '<span class="pill pill-muted">Muted</span>';

function getModReason() {
  const sel = document.getElementById('mRuleSelect');
  if (!sel || !sel.value) { alert('Please select a rule before continuing.'); return null; }
  if (sel.value === 'other') {
    const txt = (document.getElementById('mOtherText')?.value||'').trim();
    if (txt.length < 3) { alert('Please describe the reason (at least 3 characters).'); return null; }
    return 'Other: ' + txt;
  }
  const guide = PUNISHMENT_GUIDE[sel.value];
  return (guide ? guide.label : sel.value);
}

window.showRuleHint = function showRuleHint(val, role) {
  const wrap = document.getElementById('mRuleHint');
  if (!wrap) return;
  if (!val || val === 'other') { wrap.innerHTML = ''; return; }
  const guide = PUNISHMENT_GUIDE[val];
  if (!guide) { wrap.innerHTML = ''; return; }
  const rows = guide.rows.map(r => {
    const s = SEV_CFG[r.sev] || SEV_CFG.low;
    const action = role === 'staff' ? r.staff : r.mod;
    const isOwner = action.includes('Owner');
    const isMod   = action.includes('Mod');
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:10px;font-weight:700;color:${s.col};background:${s.bg};padding:2px 8px;border-radius:8px;font-family:var(--mono);flex-shrink:0;min-width:62px;text-align:center">${s.label}</span>

    </div>`;
  }).join('');
  wrap.innerHTML = `<div style="margin-top:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px">

  if (muteDur) {
    const muteUntil = Date.now()+parseInt(muteDur);
    updates.mutedUntil = new Date(muteUntil);
    history.push({ type:'Mute', reason, at:Date.now() });
    updates.pendingNotifications = arrayUnion({ type:'Mute', reason, until:muteUntil, issuedBy:email, at:Date.now() });
  }
  if (tempDur) {
    updates.tempBannedUntil = new Date(Date.now()+parseInt(tempDur));
    history.push({ type:'Temp Ban', reason, at:Date.now() });
  }
  if (history.length) updates.punishmentHistory = arrayUnion(...history);
  await updateDoc(doc(db,'users',uid2), updates);
  await writeLog(`Updated user ${uname}: role=${newRole}`);

  // Post welcome message when promoted to Staff or Mod
  if (newRole === 'Staff' || newRole === 'Mod') {
    const chanId  = newRole === 'Staff' ? 'staff' : 'mod';
    const icon    = newRole === 'Staff' ? '⚡' : '🛡';
    const roleMsg = newRole === 'Staff'
      ? 'You now have access to the Staff Dashboard where you can manage tickets, warn and mute users, and escalate issues to Mods.'
      : 'You now have access to the Mod Dashboard with full moderation tools, ticket management, and team alerts.';
    const welcomeText = icon + ' Welcome to the team, @' + uname + '!\n\n' + roleMsg + '\n\nIf you have any questions reach out to the Owner or a senior team member. Welcome aboard! — NOVA Team';
    await addDoc(collection(db,'channels',chanId,'messages'), {
      text: welcomeText,
      senderUid:'system', senderEmail:'NOVA System',
      senderUsername:'NOVA System', senderRole:'System',
      timestamp:Date.now(), system:true,
    });
  }

  closeModal(); users();
};

async function channels() {

      <td>${c.restricted?'<span class="pill pill-mod">Restricted</span>':'<span class="pill pill-open">Public</span>'}</td>
      <td>${c.readonly?'<span class="pill pill-progress">Read-only</span>':'<span class="pill pill-none">Normal</span>'}</td>

const CHAN_EMOJIS = ['#','📢','🎮','🎨','🎵','📸','💬','📌','🔊','⚡','🛡','📋','🌟','🔥','💡','🏆','🎯','📣','🌐','🔧','🎲','👾','🚀','💎','🎬','📖','🤝','🌈','⚗️','🗺️'];

function chanModalHtml(title, confirmFn, data={}) {
  const emojiOpts = CHAN_EMOJIS.map(e =>
    `<div onclick="pickChanEmoji('${e}')" style="font-size:20px;padding:5px;border-radius:6px;cursor:pointer;text-align:center;border:2px solid ${(data.icon||'#')===e?'var(--accent)':'transparent'};background:${(data.icon||'#')===e?'var(--gl2)':'transparent'}" title="${e}">${e}</div>`
  ).join('');
  return `
  <div class="modal-title">${title}</div>
  <div class="form-group">
    <label class="form-label">Channel Icon</label>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div id="chanIconPreview" style="font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px">${data.icon||'#'}</div>
      <span style="font-size:12px;color:var(--text-muted)">Select an icon below</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:120px;overflow-y:auto" id="emojiGrid">
      ${emojiOpts}
    </div>
    <input type="hidden" id="mChanIcon" value="${data.icon||'#'}">
  </div>
  <div class="form-group"><label class="form-label">Channel Name</label><input class="form-input" id="mChanName" value="${data.name||''}" placeholder="e.g. general"></div>
  <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="mChanDesc" value="${data.desc||''}" placeholder="What's this channel for?"></div>
  <div class="form-group" style="display:flex;gap:20px">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="mChanRestricted" ${data.restricted?'checked':''}> <span class="form-label" style="margin:0">Staff+ Only</span></label>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="mChanReadonly" ${data.readonly?'checked':''}> <span class="form-label" style="margin:0">Read Only</span></label>
  </div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="${confirmFn}">Save</button></div>`;
}

window.pickChanEmoji = function(e) {
  document.getElementById('mChanIcon').value = e;
  document.getElementById('chanIconPreview').textContent = e;
  document.querySelectorAll('#emojiGrid div').forEach(d => {
    const isSelected = d.title === e;
    d.style.borderColor = isSelected ? 'var(--accent)' : 'transparent';
    d.style.background = isSelected ? 'var(--gl2)' : 'transparent';
  });
};

window.newChannel = () => openModal(chanModalHtml('Create Channel', 'saveChannel()'));

window.saveChannel = async () => {
  const name = document.getElementById('mChanName').value.trim(); if(!name){alert('Channel name required.');return;}
  const icon = document.getElementById('mChanIcon').value || '#';
  await addDoc(collection(db,'channels'),{
    name, icon,
    desc: document.getElementById('mChanDesc').value.trim(),
    restricted: document.getElementById('mChanRestricted').checked,
    readonly: document.getElementById('mChanReadonly').checked,
    createdAt: Date.now()
  });
  await writeLog(`Created channel: ${icon} ${name}`); closeModal(); channels();
};

window.editChannel = async (id) => {
  const snap = await getDoc(doc(db,'channels',id));
  if(!snap.exists()) return;
  const data = snap.data();
  openModal(chanModalHtml('Edit Channel', `updateChannel('${id}')`, data));
};

window.updateChannel = async (id) => {
  const name = document.getElementById('mChanName').value.trim(); if(!name){alert('Channel name required.');return;}
  const icon = document.getElementById('mChanIcon').value || '#';
  await updateDoc(doc(db,'channels',id),{
    name, icon,
    desc: document.getElementById('mChanDesc').value.trim(),
    restricted: document.getElementById('mChanRestricted').checked,
    readonly: document.getElementById('mChanReadonly').checked,
  });
  await writeLog(`Updated channel: ${icon} ${name}`); closeModal(); channels();
};

window.deleteChannel = async (id,name) => {
  if(!confirm(`Delete channel "${name}"?`))return;
  await deleteDoc(doc(db,'channels',id)); await writeLog(`Deleted channel: ${name}`); channels();
};

async function settings() {
  const snap=await getDoc(doc(db,'settings','global'));
  const s=snap.exists()?snap.data():{};
  document.getElementById('mainContent').innerHTML=`
  <div class="panel"><div class="panel-title">System Settings</div>
    <div class="card">
      <div class="toggle-row"><div><div class="toggle-label">Maintenance Mode</div><div class="toggle-desc">Blocks all users below Senior Mod from accessing chat.</div></div><label class="toggle"><input type="checkbox" ${s.maintenance?'checked':''} onchange="saveSetting('maintenance',this.checked)"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><div><div class="toggle-label">Debug Mode</div><div class="toggle-desc">Requires maintenance mode.</div></div><label class="toggle"><input type="checkbox" ${s.debug?'checked':''} ${!s.maintenance?'disabled':''} onchange="saveSetting('debug',this.checked)"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><div><div class="toggle-label">Force WebRTC Fallback</div><div class="toggle-desc">Disables Agora, uses WebRTC (6 person cap).</div></div><label class="toggle"><input type="checkbox" ${s.voiceMode==='webrtc'?'checked':''} onchange="saveSetting('voiceMode',this.checked?'webrtc':'agora')"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><div><div class="toggle-label">🕹 Disable Arcade</div><div class="toggle-desc">Blocks all users from accessing the arcade.</div></div><label class="toggle"><input type="checkbox" ${s.arcadeDisabled?'checked':''} onchange="saveSetting('arcadeDisabled',this.checked)"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row" style="border:1px solid rgba(248,81,73,.2);border-radius:8px;padding:10px 12px;background:rgba(248,81,73,.04)"><div><div class="toggle-label" style="color:var(--danger)">🔒 Emergency Lockdown</div><div class="toggle-desc">Blocks everyone except Owner and Senior Mods. Sends an email alert when triggered.</div></div><label class="toggle"><input type="checkbox" ${s.emergency?'checked':''} onchange="toggleLockdown(this.checked)"><span class="toggle-slider"></span></label></div>
    </div>
    <div class="mb-20"></div>
    <div class="card">
      <div class="form-group"><label class="form-label">Maintenance Message</label><input class="form-input" id="sMaintMsg" value="${s.maintenanceMessage||''}"></div>
      <div class="form-group"><label class="form-label">Lockdown Message</label><input class="form-input" id="sEmergMsg" value="${s.emergencyMessage||'🔒 The server is currently in lockdown. Please wait for staff to resolve the situation.'}"></div>
      <button class="btn btn-primary" onclick="saveMessages()">Save Messages</button>
    </div>
  </div>`;
}
window.toggleLockdown = async function(on) {
  if(on){
    await setDoc(doc(db,'settings','global'),{
      emergency:true,
      emergencyMessage:'🔒 Server is in lockdown. Please wait for staff to resolve the situation.',
      lockdownTriggeredBy:email,lockdownAt:Date.now()
    },{merge:true});
    await writeLog('Triggered EMERGENCY LOCKDOWN');
    sendAlert('Emergency Lockdown Activated','NOVA Emergency Lockdown was activated.\n\n• By: '+email+'\n• Time: '+new Date().toLocaleString()+'\n\nOnly Owner and Senior Mods can access NOVA.');
  } else {
    await setDoc(doc(db,'settings','global'),{emergency:false,lockdownTriggeredBy:'',lockdownAt:0},{merge:true});
    await writeLog('Lifted EMERGENCY LOCKDOWN');
  }
  settings();
};
window.saveSetting = async (key,val) => {
  if(key==='debug'){const s=await getDoc(doc(db,'settings','global'));if(!s.data()?.maintenance&&val){alert('Debug requires maintenance mode.');settings();return;}}
  await setDoc(doc(db,'settings','global'),{[key]:val},{merge:true});
  await writeLog(`Setting: ${key}=${val}`); settings();
};
window.saveMessages = async () => {
  await setDoc(doc(db,'settings','global'),{maintenanceMessage:document.getElementById('sMaintMsg').value.trim(),emergencyMessage:document.getElementById('sEmergMsg').value.trim()},{merge:true});
  await writeLog('Updated system messages');
};

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

overview();
// ── MY TICKETS ────────────────────────────────────────────
async function mytickets() {
  document.getElementById('mainContent').innerHTML = '<div class="empty">Loading...</div>';
  const snap = await getDocs(collection(db,'tickets'));
  const mine = snap.docs.filter(d => {
    const t = d.data();
    return t.assignedTo === email;
  });

  if (!mine.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="panel"><div class="panel-title">My Assigned Tickets</div>
        <div class="empty" style="padding:48px">No tickets assigned to you yet</div>
      </div>`;
    return;
  }

  const rows = mine.map(d => {
    const t = d.data(); const id = d.id;
    const sp = {open:'pill-open',in_progress:'pill-progress',closed:'pill-closed'}[t.status]||'pill-none';
    const pp = t.priority==='high'
      ? '<span style="font-family:var(--mono);font-size:9px;background:rgba(248,81,73,0.15);color:var(--danger);padding:1px 6px;border-radius:2px;margin-left:5px">HIGH</span>'
      : t.priority==='medium'
      ? '<span style="font-family:var(--mono);font-size:9px;background:rgba(210,153,34,0.15);color:var(--warn);padding:1px 6px;border-radius:2px;margin-left:5px">MED</span>' : '';
    return `<tr>
      <td><span style="cursor:pointer;color:var(--text);font-weight:600" onclick="openTicket('${id}')">${escHtml(t.subject||'—')}</span>${pp}</td>
      <td class="mono" style="font-size:11px">${t.createdBy||'—'}</td>
      <td><span class="pill ${sp}">${t.status||'open'}</span></td>
      <td class="mono" style="font-size:11px">${ts(t.timestamp)}</td>
      <td><button class="btn btn-sm" onclick="openTicket('${id}')">Open</button></td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="panel"><div class="panel-title">My Assigned Tickets (${mine.length})</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Subject</th><th>Created By</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}
