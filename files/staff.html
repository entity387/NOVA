function ts(n) {
  if (!n) return '—';
  const d = typeof n==='object' && n.seconds ? new Date(n.seconds*1000) : new Date(n);

}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function tickets() {
  document.getElementById('mainContent').innerHTML = '<div class="empty">Loading...</div>';
  const snap = await getDocs(query(collection(db,'tickets'), orderBy('timestamp','desc')));

  // Group by status — hide tickets escalated away from Staff
  const groups = { open:[], in_progress:[], closed:[] };
  snap.docs.forEach(d => {
    const t = d.data();
    const el = t.escalationLevel || 'none';
    // Staff don't see tickets escalated to Mod or Owner
    if (el === 'staff_to_mod' || el === 'mod_to_owner') return;
    const s = t.status || 'open';
    if (!groups[s]) groups[s] = [];
    groups[s].push({ ...t, id:d.id });
  });

  function renderGroup(label, items, pillClass) {
    if (!items.length) return '';
    const rows = items.map(t => {
      const ep = {none:'pill-none',staff_to_mod:'pill-s2m',mod_to_owner:'pill-m2o'}[t.escalationLevel]||'pill-none';
      const pp = t.priority==='high'?'<span style="font-family:var(--mono);font-size:9px;background:rgba(248,81,73,0.15);color:var(--danger);padding:1px 6px;border-radius:2px;margin-left:5px">HIGH</span>':t.priority==='medium'?'<span style="font-family:var(--mono);font-size:9px;background:rgba(210,153,34,0.15);color:var(--warn);padding:1px 6px;border-radius:2px;margin-left:5px">MED</span>':'';
      const isAssignedToMe = t.assignedTo === email;
      const isUnassigned   = !t.assignedTo;
      return `<tr>
        <td><span style="cursor:pointer;color:var(--text);font-weight:600" onclick="openTicket('${t.id}')">${escHtml(t.subject||'—')}</span></td>
        <td class="mono" style="font-size:11px">${t.createdBy||'—'}</td>
        <td class="mono" style="font-size:11px">${t.assignedTo||'<span style="color:var(--text-dim)">Unassigned</span>'}</td>
        <td><span class="pill ${ep}">${t.escalationLevel||'none'}</span></td>
        <td class="mono" style="font-size:11px">${ts(t.timestamp)}</td>
        <td>
          <div class="flex-gap-sm">
            <button class="btn btn-sm" onclick="openTicket('${t.id}')">Open</button>
            ${isUnassigned ? `<button class="btn btn-sm btn-success" onclick="assignToSelf('${t.id}')">Assign Me</button>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('');
    return `<div class="mb-20">
      <div class="section-header">
        <div class="section-title"><span class="pill ${pillClass}">${label}</span></div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>Subject</th><th>Created By</th><th>Assigned To</th><th>Escalation</th><th>Created</th><th>Actions</th>
        </tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }

  const html = renderGroup('Open', groups.open, 'pill-open')
             + renderGroup('In Progress', groups.in_progress, 'pill-progress')
             + renderGroup('Closed', groups.closed, 'pill-closed');

  document.getElementById('mainContent').innerHTML = `
  <div class="panel">
    <div class="panel-title">Ticket Queue</div>
    ${html || '<div class="empty">No tickets found</div>'}
  </div>`;
}

function getModReason() {
  const sel = document.getElementById('mRuleSelect');
  if (!sel || !sel.value) { alert('Please select a rule before continuing.'); return null; }
  if (sel.value === 'other') {
    const txt = (document.getElementById('mOtherText')?.value||'').trim();
    if (txt.length < 3) { alert('Please describe the reason (at least 3 characters).'); return null; }
    return 'Other: ' + txt;
  }
  const guide = PUNISHMENT_GUIDE[sel.value];
  return (guide ? guide.label : sel.value);
}

// Open ticket modal — Staff can only see chat if assigned to them
window.openTicket = async function(id) {
  const snap = await getDoc(doc(db,'tickets',id));
  if (!snap.exists()) return;
  const t = snap.data();
  const isAssignedToMe = t.assignedTo === email;
  const canEscalate    = t.escalationLevel === 'none' && t.status !== 'closed';
  const sp = {open:'pill-open',in_progress:'pill-progress',closed:'pill-closed'}[t.status]||'pill-none';

  openModal(`
    <div class="modal-title">Ticket: ${escHtml(t.subject||'—')}</div>
    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <div>
        <div class="form-group">
          <div class="form-label">Status</div>
          <span class="pill ${sp}">${t.status||'—'}</span>
          ${isAssignedToMe && t.status !== 'closed' ? `
          <select class="form-select" id="tStatus" style="margin-top:8px">
            <option value="open"        ${t.status==='open'?'selected':''}>Open</option>
            <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In Progress</option>
          </select>` : ''}
        </div>
        <div class="form-group">
          <div class="form-label">Assigned To</div>
          <div style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">${t.assignedTo||'Unassigned'}</div>
          ${!t.assignedTo ? `<button class="btn btn-sm btn-success" style="margin-top:6px" onclick="assignToSelf('${id}');closeModal()">Assign to Myself</button>` : ''}
        </div>
        ${canEscalate ? `
        <div class="form-group">
          <div class="form-label">Escalation Reason <span style="color:var(--danger)">*</span></div>
          <textarea class="form-textarea" id="tEscReason" placeholder="Required — describe why this needs Mod attention" style="min-height:70px"></textarea>
        </div>` : `
        <div class="form-group">
          <div class="form-label">Escalation</div>
          ${t.escalationLevel === 'staff_to_mod'
            ? '<span class="pill pill-s2m">Escalated to Mod</span>'
            : t.escalationLevel === 'mod_to_owner'
              ? '<span class="pill pill-m2o">Escalated to Owner</span>'
              : '<span class="pill pill-none">None</span>'}
        </div>`}
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:6px">CREATED BY</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">${t.createdBy||'—'}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:6px">MESSAGE</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px;max-height:120px;overflow-y:auto">${escHtml(t.message||'(no message)')}</div>
      </div>
    </div>

    ${isAssignedToMe ? `
    <div class="ticket-chat-wrap">
      <div class="ticket-chat-header">💬 Ticket Chat</div>
      <div class="ticket-chat-messages" id="tchatMessages">
        <div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center;padding:20px">Loading...</div>
      </div>
      <div class="ticket-chat-input">
        <input id="tchatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendTicketChat('${id}')">
        <button onclick="sendTicketChat('${id}')">Send</button>
      </div>
    </div>` : `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:1px">
      💬 Ticket chat is only visible when this ticket is assigned to you
    </div>`}

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Close</button>
      ${canEscalate ? `<button class="btn btn-warn" onclick="escalateToMod('${id}')">Escalate to Mod</button>` : ''}
      ${isAssignedToMe && t.status !== 'closed' ? `<button class="btn btn-primary" onclick="updateStatus('${id}')">Update Status</button>` : ''}
    </div>`, true);

  if (isAssignedToMe) loadTicketChat(id);
};

function loadTicketChat(ticketId) {
  const q = query(collection(db,'tickets',ticketId,'chat'), orderBy('timestamp','asc'));
  const unsub = onSnapshot(q, snap => {
    const el = document.getElementById('tchatMessages');
    if (!el) { unsub(); return; }
    if (!snap.docs.length) {
      el.innerHTML = `<div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center;padding:20px">No messages yet — start the conversation</div>`;
      return;
    }
    el.innerHTML = snap.docs.map(d => {
      const m = d.data();
      const r = m.senderRole || 'User';
      const cls = r==='Owner'?'avatar-owner':r==='Mod'?'avatar-mod':r==='Staff'?'avatar-staff':'avatar-user';
      const col = r==='Owner'?'var(--gold)':r==='Mod'?'var(--info)':r==='Staff'?'var(--success)':'var(--text)';
      return `<div class="tchat-msg">
        <div class="tchat-avatar ${cls}">${(m.senderEmail||'?')[0].toUpperCase()}</div>
        <div class="tchat-body">
          <div class="tchat-meta">
            <span class="tchat-author" style="color:${col}">${escHtml(m.senderEmail||'—')}</span>
            <span class="tchat-time">${ts(m.timestamp)}</span>
          </div>
          <div class="tchat-text">${escHtml(m.text||'')}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

window.sendTicketChat = async function(ticketId) {
  const input = document.getElementById('tchatInput');
  if (!input) return;
  const text = input.value.trim(); if (!text) return;
  input.value = '';
  await addDoc(collection(db,'tickets',ticketId,'chat'), {
    text, senderUid:uid, senderEmail:email, senderRole:'Staff', timestamp:Date.now()
  });
  try { await updateDoc(doc(db,'tickets',ticketId), { lastStaffReply:Date.now() }); } catch(_) {}
};

window.updateStatus = async function(id) {
  const sel = document.getElementById('tStatus');
  if (!sel) return;
  await updateDoc(doc(db,'tickets',id), { status:sel.value });
  closeModal(); tickets();
};

window.escalateToMod = async function(id) {
  const reason = document.getElementById('tEscReason')?.value.trim();
  if (!reason) { alert('An escalation reason is required.'); return; }
  await updateDoc(doc(db,'tickets',id), {
    escalationLevel:'staff_to_mod',
    escalationReason:reason,
    escalatedBy:email,
    status:'in_progress',
  });
  closeModal(); tickets();
};

// USERS — Staff: Warn and Mute only

async function users() {
  document.getElementById('mainContent').innerHTML = '<div class="empty">Loading...</div>';
  const snap = await getDocs(collection(db,'users'));
  const rows = snap.docs.map(d => {
    const u = d.data(); const uid2 = d.id;
    // Staff can only see other Staff and Users — not Owner or Mod
    if (u.role === 'Owner' || u.role === 'Mod') return '';
    const uname = u.username || u.email || '—';
    const now = Date.now();
    const isMuted = u.mutedUntil && (u.mutedUntil.seconds
      ? u.mutedUntil.seconds*1000
      : new Date(u.mutedUntil).getTime()) > now;
    const pfpHtml = u.pfp
      ? `<img src="${u.pfp}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : `<div style="width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim);flex-shrink:0">${uname[0].toUpperCase()}</div>`;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${pfpHtml}
        <div>
          <div style="font-weight:600;font-size:13px">${escHtml(uname)}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${u.email||''}</div>
        </div>
      </div></td>
      <td><span class="pill ${u.role==='Staff'?'pill-staff':'pill-user'}">${u.role==='Staff'?'⚡ ':''}${u.role||'User'}</span></td>
      <td style="font-family:var(--mono)">${u.warningsCount||0}</td>
      <td>${isMuted ? '<span class="pill pill-muted">Muted</span>' : u.banned ? '<span class="pill pill-banned">Banned</span>' : '<span class="pill pill-none">Active</span>'}</td>
      <td>
        <div class="flex-gap-sm">
          <button class="btn btn-sm btn-warn" onclick="warnUser('${uid2}','${escHtml(uname)}')">Warn</button>
          <button class="btn btn-sm" onclick="muteUser('${uid2}','${escHtml(uname)}')">Mute</button>
          ${u.staffNotes?`<button class="btn btn-sm" onclick="viewNotes('${uid2}','${escHtml(uname)}')" style="border-color:rgba(20,184,166,.4);color:#14b8a6" title="${escHtml(u.staffNotes.slice(0,40))}">📋 Notes</button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="5"><div class="empty">No users found</div></td></tr>';

  document.getElementById('mainContent').innerHTML = `
  <div class="panel"><div class="panel-title">User Moderation</div>
    <div class="table-wrap"><table><thead><tr>
      <th>User</th><th>Role</th><th>Warnings</th><th>Status</th><th>Actions</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}




window.viewNotes = async function(uid2, uname) {
  const snap = await getDoc(doc(db,'users',uid2));
  const notes = snap.exists() ? (snap.data().staffNotes||'') : '';
  openModal(`<div class="modal-title">📋 Staff Notes: ${uname}</div>
    <div class="form-group">
      <label class="form-label">Notes <span style="color:var(--text-dim);font-size:9px">(private — not visible to users)</span></label>
      <textarea class="form-textarea" id="sNotesText" placeholder="Add notes about this user..." style="min-height:80px">${escHtml(notes)}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNotes('${uid2}')">Save Notes</button>
    </div>`);
};

window.saveNotes = async function(uid2) {
  const notes = document.getElementById('sNotesText')?.value.trim()||'';
  await updateDoc(doc(db,'users',uid2),{staffNotes:notes});
  closeModal();
};

window.confirmWarn = async function(uid2, uname) {
  const reason = getModReason(); if(!reason) return;
  const snap = await getDoc(doc(db,'users',uid2));
  const cnt  = (snap.data().warningsCount||0) + 1;
  await updateDoc(doc(db,'users',uid2), {
    warningsCount:cnt,
    punishmentHistory: arrayUnion({ type:'Warn', reason, at:Date.now() }),
    pendingNotifications: arrayUnion({ type:'Warn', reason, issuedBy:email, at:Date.now() })
  });
  closeModal(); users();
};

    <div id="mRuleHint"></div>

window.confirmMute = async function(uid2, uname) {
  const reason = getModReason(); if(!reason) return;
  const dur = parseInt(document.getElementById('mMuteDur').value);
  const muteUntil = Date.now()+dur;
  await updateDoc(doc(db,'users',uid2), {
    mutedUntil: new Date(muteUntil),
    punishmentHistory: arrayUnion({ type:'Mute', reason, at:Date.now() }),
    pendingNotifications: arrayUnion({ type:'Mute', reason, until:muteUntil, issuedBy:email, at:Date.now() })
  });
  closeModal(); users();
};

// ── MY TICKETS ────────────────────────────────────────────
async function mytickets() {
  document.getElementById('mainContent').innerHTML = '<div class="empty">Loading...</div>';
  const snap = await getDocs(collection(db,'tickets'));
  const mine = snap.docs.filter(d => {
    const t = d.data();
    return t.assignedTo === email;
  });

  if (!mine.length) {
    document.getElementById('mainContent').innerHTML = `
      <div class="panel"><div class="panel-title">My Assigned Tickets</div>
        <div class="empty" style="padding:48px">No tickets assigned to you yet</div>
      </div>`;
    return;
  }

  const rows = mine.map(d => {
    const t = d.data(); const id = d.id;
    const sp = {open:'pill-open',in_progress:'pill-progress',closed:'pill-closed'}[t.status]||'pill-none';
    const pp = t.priority==='high'
      ? '<span style="font-family:var(--mono);font-size:9px;background:rgba(248,81,73,0.15);color:var(--danger);padding:1px 6px;border-radius:2px;margin-left:5px">HIGH</span>'
      : t.priority==='medium'
      ? '<span style="font-family:var(--mono);font-size:9px;background:rgba(210,153,34,0.15);color:var(--warn);padding:1px 6px;border-radius:2px;margin-left:5px">MED</span>' : '';
    return `<tr>
      <td>
        <span style="cursor:pointer;color:var(--text);font-weight:600" onclick="openTicket('${id}')">${escHtml(t.subject||'—')}</span>${pp}
        ${t.category==='ban_appeal'?'<span style="font-family:var(--mono);font-size:8px;background:rgba(248,81,73,.15);color:var(--danger);padding:1px 6px;border-radius:4px;margin-left:5px;font-weight:700">BAN APPEAL</span>':t.category==='mute_appeal'?'<span style="font-family:var(--mono);font-size:8px;background:rgba(210,153,34,.15);color:var(--warn);padding:1px 6px;border-radius:4px;margin-left:5px;font-weight:700">MUTE APPEAL</span>':''}
      </td>
      <td class="mono" style="font-size:11px">${t.createdBy||'—'}</td>
      <td><span class="pill ${sp}">${t.status||'open'}</span></td>
      <td class="mono" style="font-size:11px">${ts(t.timestamp)}</td>
      <td><button class="btn btn-sm" onclick="openTicket('${id}')">Open</button></td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="panel"><div class="panel-title">My Assigned Tickets (${mine.length})</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Subject</th><th>Created By</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}
