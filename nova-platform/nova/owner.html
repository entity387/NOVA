<!DOCTYPE html>
<html lang="en">
<head>

  <nav class="sidebar-nav">

<div class="main-area">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">OVERVIEW</div>
    <div class="topbar-badges">
      <span class="badge badge-maint" id="badgeMaint" style="display:none">⚠ MAINTENANCE</span>
      <span class="badge badge-debug" id="badgeDebug" style="display:none">⚡ DEBUG</span>
      <span class="badge badge-owner">👑 OWNER</span>
    </div>
  </div>
  <div class="banner banner-maint" id="bannerMaint"></div>
  <div class="banner banner-debug" id="bannerDebug">⚡ Debug mode active</div>
  <div class="content" id="mainContent"><div class="empty">Loading...</div></div>
</div>

<div class="debug-hud" id="debugHud">
  <div class="hud-title">▸ Debug HUD</div>
  <div class="hud-row"><span class="hud-key">REAL ROLE</span><span class="hud-val">Owner</span></div>
  <div class="hud-row"><span class="hud-key">SIM ROLE</span><span class="hud-val" id="hudSim">—</span></div>
  <div class="hud-row"><span class="hud-key">DEBUG</span><span class="hud-val" id="hudDebug">off</span></div>
  <div class="hud-row"><span class="hud-key">USER</span><span class="hud-val" id="hudEmail" style="max-width:130px;overflow:hidden;text-overflow:ellipsis">—</span></div>
  <hr class="divider" style="margin:10px 0">
  <div class="form-label">Simulate Role</div>
  <select class="form-select" onchange="simRole(this.value)" style="font-size:12px;padding:6px 10px">
    <option value="">None</option>
    <option value="Owner">Owner</option>
    <option value="Mod">Mod</option>
    <option value="Staff">Staff</option>
  </select>
</div>

<div id="modalContainer"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc,
  deleteDoc, query, orderBy, limit, onSnapshot, setDoc, arrayUnion, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClEfbrTpSwVPpThWZJukobJN9tCKMXTx4",
  authDomain: "nova-7a26f.firebaseapp.com",
  projectId: "nova-7a26f",
  storageBucket: "nova-7a26f.firebasestorage.app",
  messagingSenderId: "98300801242",
  appId: "1:98300801242:web:77c16453b6dac8fed3b5e3",
  measurementId: "G-67N1G1RFMS"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const uid   = sessionStorage.getItem('nova_uid');
const email = sessionStorage.getItem('nova_email');
const role  = sessionStorage.getItem('nova_role');
if (!uid || role !== 'Owner') { window.location.href = 'index.html'; }

document.getElementById('userEmail').textContent = email || '—';
document.getElementById('hudEmail').textContent  = email || '—';

// Settings listener
onSnapshot(doc(db,'settings','global'), snap => {
  if (!snap.exists()) return;
  const s = snap.data();
  document.getElementById('badgeMaint').style.display = s.maintenance ? '' : 'none';
  document.getElementById('badgeDebug').style.display = s.debug ? '' : 'none';
  const bm = document.getElementById('bannerMaint');
  if (s.maintenance) { bm.style.display='block'; bm.textContent='⚠ '+(s.maintenanceMessage||'Maintenance active.'); }
  else bm.style.display='none';
  document.getElementById('bannerDebug').style.display = s.debug ? 'block' : 'none';
  document.getElementById('debugHud').style.display    = s.debug ? 'block' : 'none';
  document.getElementById('hudDebug').textContent      = s.debug ? 'on' : 'off';
});

// ── HELPERS ───────────────────────────────────────────────
window.showPanel = function(name) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+name); if(nb) nb.classList.add('active');
  document.getElementById('topbarTitle').textContent = name.toUpperCase();
  ({overview,tickets,users,channels,settings,logs,alerts,roles})[name]?.();
};
window.doLogout  = async () => { await signOut(auth); sessionStorage.clear(); window.location.href='index.html'; };
window.simRole   = r => { document.getElementById('hudSim').textContent = r||'—'; };

function ts(n) { if(!n) return '—'; const d=typeof n==='object'&&n.seconds?new Date(n.seconds*1000):new Date(n); return d.toLocaleString(); }
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }
function openModal(html, lg=false) {
  document.getElementById('modalContainer').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
       <div class="modal${lg?' modal-lg':''}">${html}</div>
     </div>`;
}
window.closeModal = closeModal;

async function writeLog(action) {
  await addDoc(collection(db,'logs'), { user:email, role:'Owner', action, timestamp:Date.now() });
}

function rolePill(r) {
  const map  = { Owner:'pill-owner', Mod:'pill-mod', Staff:'pill-staff', User:'pill-user' };
  const icons= { Owner:'👑 ', Mod:'🛡 ', Staff:'⚡ ', User:'' };
  return `<span class="pill ${map[r]||'pill-user'}">${icons[r]||''}${r}</span>`;
}

// ── LOAD ASSIGNABLE USERS (for ticket assignment) ─────────
async function loadAssignableUsers() {
  const snap = await getDocs(collection(db,'users'));
  // Owner sees Mod + Staff
  return snap.docs
    .map(d => ({ uid:d.id, ...d.data() }))
    .filter(u => u.role==='Mod' || u.role==='Staff')
    .sort((a,b) => {
      if (a.role==='Mod' && b.role!=='Mod') return -1;
      if (b.role==='Mod' && a.role!=='Mod') return 1;
      return (a.username||a.email).localeCompare(b.username||b.email);
    });
}

function buildAssignSelect(assignableUsers, currentAssigned) {
  const opts = assignableUsers.map(u =>
    `<option value="${u.email}" ${currentAssigned===u.email?'selected':''}>${u.username||u.email} [${u.role}]</option>`
  ).join('');
  return `<select class="form-select" id="mAssign">
    <option value="">Unassigned</option>
    <option value="${email}" ${currentAssigned===email?'selected':''}>Myself [Owner]</option>
    ${opts}
  </select>`;
}

// ══════════════════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════════════════
async function overview() {
  document.getElementById('mainContent').innerHTML='<div class="empty">Loading...</div>';
  const [uSnap,tSnap,lSnap,aSnap] = await Promise.all([
    getDocs(collection(db,'users')),
    getDocs(collection(db,'tickets')),
    getDocs(query(collection(db,'logs'),orderBy('timestamp','desc'),limit(8))),
    getDocs(query(collection(db,'channels','devalerts','messages'),orderBy('timestamp','desc'),limit(5))),
  ]);
  const users  = uSnap.docs.map(d=>d.data());
  const staff  = users.filter(u=>u.role==='Staff').length;
  const mods   = users.filter(u=>u.role==='Mod').length;
  const open   = tSnap.docs.filter(d=>d.data().status==='open').length;
  const logRows = lSnap.docs.map(d=>{const l=d.data();return`<div class="log-entry"><span class="log-time">${ts(l.timestamp)}</span><span class="log-user">${l.user||'—'}</span><span class="log-action">${l.action}</span></div>`;}).join('')||'<div class="empty">No logs</div>';
  const alertRows = aSnap.docs.map(d=>{const a=d.data();return`<div class="alert-entry"><div class="alert-meta"><span class="alert-sender">${a.sender||'—'}</span><span class="alert-time">${ts(a.timestamp)}</span></div><div class="alert-text">${a.text||''}</div></div>`;}).join('')||'<div class="empty">No alerts</div>';
  document.getElementById('mainContent').innerHTML=`
  <div class="panel">
    <div class="panel-title">System Overview</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value accent">${users.length}</div></div>
      <div class="stat-card"><div class="stat-label">Staff</div><div class="stat-value">${staff}</div></div>
      <div class="stat-card"><div class="stat-label">Mods</div><div class="stat-value">${mods}</div></div>
      <div class="stat-card"><div class="stat-label">Open Tickets</div><div class="stat-value">${open}</div></div>
    </div>
    <div class="grid-2">
      <div><div class="section-header"><div class="section-title">Recent Logs</div></div><div class="card" style="padding:0">${logRows}</div></div>
      <div><div class="section-header"><div class="section-title">Mod Alerts</div></div><div class="card" style="padding:0">${alertRows}</div></div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// TICKETS
// ══════════════════════════════════════════════════════════
async function tickets() {
  document.getElementById('mainContent').innerHTML='<div class="empty">Loading...</div>';
  const snap = await getDocs(query(collection(db,'tickets'),orderBy('timestamp','desc')));
  const rows = snap.docs.map(d => {
    const t=d.data(); const id=d.id;
    const sp = {open:'pill-open',in_progress:'pill-progress',closed:'pill-closed'}[t.status]||'pill-none';
    const ep = {none:'pill-none',staff_to_mod:'pill-s2m',mod_to_owner:'pill-m2o'}[t.escalationLevel]||'pill-none';
    const pp = t.priority==='high'?'<span style="font-family:var(--mono);font-size:9px;background:rgba(248,81,73,0.15);color:var(--danger);padding:1px 6px;border-radius:2px;margin-left:5px">HIGH</span>':t.priority==='medium'?'<span style="font-family:var(--mono);font-size:9px;background:rgba(210,153,34,0.15);color:var(--warn);padding:1px 6px;border-radius:2px;margin-left:5px">MED</span>':'';
    return `<tr>
      <td><span style="cursor:pointer;color:var(--text);font-weight:600" onclick="openTicket('${id}')">${t.subject||'—'}</span>${pp}</td>
      <td class="mono" style="font-size:11px">${t.createdBy||'—'}</td>
      <td><span class="pill ${sp}">${t.status||'—'}</span></td>
      <td class="mono" style="font-size:11px">${t.assignedTo||'—'}</td>
      <td><span class="pill ${ep}">${t.escalationLevel||'none'}</span></td>
      <td class="mono" style="font-size:11px">${ts(t.timestamp)}</td>
      <td>
        <div class="flex-gap-sm">
          <button class="btn btn-sm" onclick="openTicket('${id}')">Open</button>
          <button class="btn btn-sm btn-danger" onclick="deleteTicket('${id}')">Del</button>
        </div>
      </td>
    </tr>`;
  }).join('')||'<tr><td colspan="7"><div class="empty">No tickets</div></td></tr>';

  document.getElementById('mainContent').innerHTML=`
  <div class="panel">
    <div class="section-header">
      <div class="panel-title">Ticket Management</div>
      <button class="btn btn-primary" onclick="newTicket()">+ New Ticket</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Subject</th><th>Created By</th><th>Status</th><th>Assigned To</th><th>Escalation</th><th>Created</th><th>Actions</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>
  </div>`;
}

window.newTicket = async function() {
  const assignable = await loadAssignableUsers();
  openModal(`
    <div class="modal-title">New Ticket</div>
    <div class="form-group"><label class="form-label">Subject</label><input class="form-input" id="mSubject"></div>
    <div class="form-group"><label class="form-label">Message</label><textarea class="form-textarea" id="mMsg"></textarea></div>
    <div class="form-group"><label class="form-label">Assign To</label>${buildAssignSelect(assignable,'')}</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewTicket()">Create</button>
    </div>`);
};

window.saveNewTicket = async function() {
  const subj = document.getElementById('mSubject').value.trim();
  if (!subj) return;
  await addDoc(collection(db,'tickets'), {
    subject:subj, message:document.getElementById('mMsg').value.trim(),
    createdBy:email, assignedTo:document.getElementById('mAssign').value||'',
    status:'open', timestamp:Date.now(),
    escalationLevel:'none', escalationReason:'', escalatedBy:''
  });
  await writeLog(`Created ticket: ${subj}`);
  closeModal(); tickets();
};

// Open ticket in large modal with chat
window.openTicket = async function(id) {
  const snap = await getDoc(doc(db,'tickets',id));
  if (!snap.exists()) return;
  const t = snap.data();
  const assignable = await loadAssignableUsers();
  const sp = {open:'pill-open',in_progress:'pill-progress',closed:'pill-closed'}[t.status]||'pill-none';
  const ep = {none:'pill-none',staff_to_mod:'pill-s2m',mod_to_owner:'pill-m2o'}[t.escalationLevel]||'pill-none';

  openModal(`
    <div class="modal-title">Ticket: ${t.subject||'—'}</div>
    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <div>
        <div class="form-group">
          <div class="form-label">Status</div>
          <select class="form-select" id="tStatus">
            <option value="open"        ${t.status==='open'?'selected':''}>Open</option>
            <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In Progress</option>
            <option value="closed"      ${t.status==='closed'?'selected':''}>Closed</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Assign To</div>
          ${buildAssignSelect(assignable, t.assignedTo||'')}
        </div>
        <div class="form-group">
          <div class="form-label">Escalation</div>
          <select class="form-select" id="tEsc">
            <option value="none"          ${t.escalationLevel==='none'?'selected':''}>None</option>
            <option value="staff_to_mod"  ${t.escalationLevel==='staff_to_mod'?'selected':''}>Staff → Mod</option>
            <option value="mod_to_owner"  ${t.escalationLevel==='mod_to_owner'?'selected':''}>Mod → Owner</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Escalation Reason</div>
          <input class="form-input" id="tEscReason" value="${t.escalationReason||''}">
        </div>
      </div>
      <div>
        <div class="form-label" style="margin-bottom:8px">Details</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:4px">CREATED BY</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">${t.createdBy||'—'}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:4px">MESSAGE</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px">${t.message||'(no message)'}</div>
      </div>
    </div>

    <div class="ticket-chat-wrap">
      <div class="ticket-chat-header">💬 Ticket Chat</div>
      <div class="ticket-chat-messages" id="tchatMessages">
        <div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center;padding:20px">Loading...</div>
      </div>
      <div class="ticket-chat-input">
        <input id="tchatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendTicketChat('${id}')">
        <button onclick="sendTicketChat('${id}')">Send</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="closeTicket('${id}')">Close &amp; Delete Ticket</button>
      <button class="btn btn-primary" onclick="saveTicket('${id}')">Save Changes</button>
    </div>`, true);

  // Load ticket chat
  loadTicketChat(id);
};

function loadTicketChat(ticketId) {
  const q = query(collection(db,'tickets',ticketId,'chat'), orderBy('timestamp','asc'));
  const unsub = onSnapshot(q, snap => {
    const el = document.getElementById('tchatMessages');
    if (!el) { unsub(); return; }
    if (!snap.docs.length) {
      el.innerHTML = `<div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;text-align:center;padding:20px">No messages yet</div>`;
      return;
    }
    el.innerHTML = snap.docs.map(d => {
      const m = d.data();
      const r = m.senderRole||'User';
      const cls = r==='Owner'?'avatar-owner':r==='Mod'?'avatar-mod':r==='Staff'?'avatar-staff':'avatar-user';
      const col = r==='Owner'?'var(--gold)':r==='Mod'?'var(--info)':r==='Staff'?'var(--success)':'var(--text)';
      return `<div class="tchat-msg">
        <div class="tchat-avatar ${cls}">${(m.senderEmail||'?')[0].toUpperCase()}</div>
        <div class="tchat-body">
          <div class="tchat-meta">
            <span class="tchat-author" style="color:${col}">${m.senderEmail||'—'}</span>
            <span class="tchat-time">${ts(m.timestamp)}</span>
          </div>
          <div class="tchat-text">${escHtml(m.text||'')}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

window.sendTicketChat = async function(ticketId) {
  const input = document.getElementById('tchatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await addDoc(collection(db,'tickets',ticketId,'chat'), {
    text, senderUid:uid, senderEmail:email, senderRole:'Owner', timestamp:Date.now()
  });
};

window.saveTicket = async function(id) {
  const data = {
    status:           document.getElementById('tStatus').value,
    assignedTo:       document.getElementById('mAssign').value||'',
    escalationLevel:  document.getElementById('tEsc').value,
    escalationReason: document.getElementById('tEscReason').value.trim(),
  };
  await updateDoc(doc(db,'tickets',id), data);
  await writeLog(`Updated ticket ${id}`);
  closeModal(); tickets();
};

window.closeTicket = async function(id) {
  if (!confirm('Close and permanently delete this ticket and its chat?')) return;
  // Delete chat subcollection messages
  const chatSnap = await getDocs(collection(db,'tickets',id,'chat'));
  for (const d of chatSnap.docs) await deleteDoc(d.ref);
  await deleteDoc(doc(db,'tickets',id));
  await writeLog(`Closed & deleted ticket ${id}`);
  closeModal(); tickets();
};

window.deleteTicket = async function(id) {
  if (!confirm('Delete this ticket?')) return;
  const chatSnap = await getDocs(collection(db,'tickets',id,'chat'));
  for (const d of chatSnap.docs) await deleteDoc(d.ref);
  await deleteDoc(doc(db,'tickets',id));
  await writeLog(`Deleted ticket ${id}`);
  tickets();
};

// ══════════════════════════════════════════════════════════
// USERS — full Owner punishment system
// ══════════════════════════════════════════════════════════
async function users() {
  document.getElementById('mainContent').innerHTML='<div class="empty">Loading...</div>';
  const snap = await getDocs(collection(db,'users'));
  const rows = snap.docs.map(d => {
    const u=d.data(); const uid2=d.id;
    const uname = u.username||u.email||'—';
    const now = Date.now();
    const isTempBanned = u.tempBannedUntil && (u.tempBannedUntil.seconds ? u.tempBannedUntil.seconds*1000 : new Date(u.tempBannedUntil).getTime()) > now;
    const isMuted = u.mutedUntil && (u.mutedUntil.seconds ? u.mutedUntil.seconds*1000 : new Date(u.mutedUntil).getTime()) > now;
    let statusPill = '<span class="pill pill-none">Active</span>';
    if (u.banned) statusPill = '<span class="pill pill-banned">Banned</span>';
    else if (isTempBanned) statusPill = '<span class="pill pill-tempban">Temp Banned</span>';
    else if (isMuted) statusPill = '<span class="pill pill-muted">Muted</span>';
    const pfpHtml = u.pfp
      ? `<img src="${u.pfp}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : `<div style="width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-dim);flex-shrink:0">${uname[0].toUpperCase()}</div>`;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${pfpHtml}<div><div style="font-weight:600;font-size:13px">${escHtml(uname)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${u.email||''}</div></div></div></td>
      <td>${rolePill(u.role||'User')}</td>
      <td style="font-family:var(--mono)">${u.warningsCount||0}</td>
      <td>${statusPill}</td>
      <td><button class="btn btn-sm" onclick="manageUser('${uid2}')">Manage</button></td>
    </tr>`;
  }).join('')||'<tr><td colspan="5"><div class="empty">No users</div></td></tr>';

  document.getElementById('mainContent').innerHTML=`
  <div class="panel"><div class="panel-title">User Management</div>
    <div class="table-wrap"><table><thead><tr>
      <th>User</th><th>Role</th><th>Warnings</th><th>Status</th><th>Actions</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

window.manageUser = async function(uid2) {
  const snap = await getDoc(doc(db,'users',uid2));
  if (!snap.exists()) return;
  const u = snap.data();
  const uname = u.username||u.email||'—';
  const now = Date.now();
  const isTempBanned = u.tempBannedUntil && (u.tempBannedUntil.seconds?u.tempBannedUntil.seconds*1000:new Date(u.tempBannedUntil).getTime()) > now;
  const isMuted = u.mutedUntil && (u.mutedUntil.seconds?u.mutedUntil.seconds*1000:new Date(u.mutedUntil).getTime()) > now;

  // Punishment history
  const history = (u.punishmentHistory||[]).slice(-8).reverse();
  const histHtml = history.length
    ? history.map(p=>`<div class="punish-item"><span class="punish-type text-warn">${p.type}</span><span style="color:var(--text-muted);font-size:12px">${p.reason||'—'}</span><span class="punish-date">${ts(p.at)}</span></div>`).join('')
    : '<div style="color:var(--text-dim);font-family:var(--mono);font-size:11px;padding:8px">No history</div>';

  openModal(`
    <div class="modal-title">Manage: ${escHtml(uname)}</div>
    <div class="grid-2" style="gap:16px;margin-bottom:16px">
      <div>
        <div class="form-group">
          <div class="form-label">Role</div>
          <select class="form-select" id="mRole">
            <option value="User"  ${u.role==='User'?'selected':''}>User</option>
            <option value="Staff" ${u.role==='Staff'?'selected':''}>⚡ Staff</option>
            <option value="Mod"   ${u.role==='Mod'?'selected':''}>🛡 Mod</option>
            <option value="Owner" ${u.role==='Owner'?'selected':''}>👑 Owner</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Mute Duration</div>
          <select class="form-select" id="mMuteDur">
            <option value="">No mute</option>
            <option value="3600000">1 hour</option>
            <option value="86400000">24 hours</option>
            <option value="604800000">7 days</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Temp Ban Duration</div>
          <select class="form-select" id="mTempBan">
            <option value="">No temp ban</option>
            <option value="3600000">1 hour</option>
            <option value="86400000">24 hours</option>
            <option value="604800000">7 days</option>
            <option value="2592000000">30 days</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Punishment Reason</div>
          <input class="form-input" id="mPunishReason" placeholder="Optional reason">
        </div>
      </div>
      <div>
        <div class="form-label" style="margin-bottom:8px">Punishment History</div>
        <div class="punish-list">${histHtml}</div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      ${u.warningsCount>0?`<button class="btn btn-success btn-sm" onclick="removeWarnings('${uid2}','${uname}')">Remove Warnings (${u.warningsCount})</button>`:''}
      ${isMuted?`<button class="btn btn-success btn-sm" onclick="unmute('${uid2}','${uname}')">Unmute</button>`:''}
      ${isTempBanned?`<button class="btn btn-success btn-sm" onclick="untempban('${uid2}','${uname}')">Remove Temp Ban</button>`:''}
      ${u.banned?`<button class="btn btn-success btn-sm" onclick="unban('${uid2}','${uname}')">Unban</button>`:`<button class="btn btn-danger btn-sm" onclick="permBan('${uid2}','${uname}')">Perm Ban</button>`}
      <button class="btn btn-warn btn-sm" onclick="warnUser('${uid2}','${uname}')">Warn</button>
      <button class="btn btn-primary" onclick="saveUser('${uid2}','${uname}')">Apply</button>
    </div>`, true);
};

window.warnUser = async function(uid2, uname) {
  const reason = document.getElementById('mPunishReason')?.value||'';
  const snap = await getDoc(doc(db,'users',uid2));
  const cnt = (snap.data().warningsCount||0)+1;
  await updateDoc(doc(db,'users',uid2), {
    warningsCount: cnt,
    punishmentHistory: arrayUnion({ type:'Warn', reason, at:Date.now() })
  });
  await writeLog(`Warned ${uname} (total: ${cnt})`);
  closeModal(); users();
};

window.removeWarnings = async function(uid2, uname) {
  await updateDoc(doc(db,'users',uid2), { warningsCount:0 });
  await writeLog(`Removed all warnings for ${uname}`);
  closeModal(); users();
};

window.unmute = async function(uid2, uname) {
  await updateDoc(doc(db,'users',uid2), { mutedUntil:null });
  await writeLog(`Unmuted ${uname}`);
  closeModal(); users();
};

window.untempban = async function(uid2, uname) {
  await updateDoc(doc(db,'users',uid2), { tempBannedUntil:null });
  await writeLog(`Removed temp ban for ${uname}`);
  closeModal(); users();
};

window.permBan = async function(uid2, uname) {
  if (!confirm(`Permanently ban ${uname}?`)) return;
  const reason = document.getElementById('mPunishReason')?.value||'';
  await updateDoc(doc(db,'users',uid2), {
    banned:true,
    punishmentHistory: arrayUnion({ type:'Perm Ban', reason, at:Date.now() })
  });
  await writeLog(`Permanently banned ${uname}`);
  closeModal(); users();
};

window.unban = async function(uid2, uname) {
  await updateDoc(doc(db,'users',uid2), { banned:false });
  await writeLog(`Unbanned ${uname}`);
  closeModal(); users();
};

window.saveUser = async function(uid2, uname) {
  const newRole  = document.getElementById('mRole').value;
  const muteDur  = document.getElementById('mMuteDur').value;
  const tempDur  = document.getElementById('mTempBan').value;
  const reason   = document.getElementById('mPunishReason').value.trim();
  const updates  = { role: newRole };
  const history  = [];
  if (muteDur) {
    updates.mutedUntil = new Date(Date.now()+parseInt(muteDur));
    history.push({ type:'Mute', reason, at:Date.now() });
  }
  if (tempDur) {
    updates.tempBannedUntil = new Date(Date.now()+parseInt(tempDur));
    history.push({ type:'Temp Ban', reason, at:Date.now() });
  }
  if (history.length) updates.punishmentHistory = arrayUnion(...history);
  await updateDoc(doc(db,'users',uid2), updates);
  await writeLog(`Updated user ${uname}: role=${newRole}`);
  closeModal(); users();
};

async function channels() {
  document.getElementById('mainContent').innerHTML='<div class="empty">Loading...</div>';
  const snap = await getDocs(collection(db,'channels'));
  const rows = snap.docs.map(d=>{
    const c=d.data(); const cid=d.id;
    return `<tr>
      <td class="mono">${c.name||cid}</td>
      <td>${c.restricted?'<span class="pill pill-mod">Restricted</span>':'<span class="pill pill-open">Public</span>'}</td>
      <td>${c.readonly?'<span class="pill pill-progress">Read-only</span>':'<span class="pill pill-none">Normal</span>'}</td>
      <td class="mono" style="font-size:11px">${ts(c.createdAt)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteChannel('${cid}','${c.name||cid}')">Delete</button></td>
    </tr>`;
  }).join('')||'<tr><td colspan="5"><div class="empty">No channels</div></td></tr>';
  document.getElementById('mainContent').innerHTML=`
  <div class="panel">
    <div class="section-header"><div class="panel-title">Channels</div><button class="btn btn-primary" onclick="newChannel()">+ New Channel</button></div>
    <div class="table-wrap"><table><thead><tr><th>Name</th><th>Access</th><th>Type</th><th>Created</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}
window.newChannel = () => openModal(`
  <div class="modal-title">Create Channel</div>
  <div class="form-group"><label class="form-label">Channel Name</label><input class="form-input" id="mChanName"></div>
  <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="mChanDesc"></div>
  <div class="form-group" style="display:flex;gap:20px">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="mChanRestricted"> <span class="form-label" style="margin:0">Staff+ Only</span></label>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="mChanReadonly"> <span class="form-label" style="margin:0">Read Only</span></label>
  </div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveChannel()">Create</button></div>`);
window.saveChannel = async () => {
  const name = document.getElementById('mChanName').value.trim(); if(!name)return;
  await addDoc(collection(db,'channels'),{name,desc:document.getElementById('mChanDesc').value.trim(),restricted:document.getElementById('mChanRestricted').checked,readonly:document.getElementById('mChanReadonly').checked,createdAt:Date.now()});
  await writeLog(`Created channel: ${name}`); closeModal(); channels();
};
window.deleteChannel = async (id,name) => {
  if(!confirm(`Delete channel "${name}"?`))return;
  await deleteDoc(doc(db,'channels',id)); await writeLog(`Deleted channel: ${name}`); channels();
};

// SETTINGS
// ══════════════════════════════════════════════════════════
async function settings() {
  const snap=await getDoc(doc(db,'settings','global'));
  const s=snap.exists()?snap.data():{};
  document.getElementById('mainContent').innerHTML=`
  <div class="panel"><div class="panel-title">System Settings</div>
    <div class="card">
      <div class="toggle-row"><div><div class="toggle-label">Maintenance Mode</div><div class="toggle-desc">Only Owner &amp; Mods can access.</div></div><label class="toggle"><input type="checkbox" ${s.maintenance?'checked':''} onchange="saveSetting('maintenance',this.checked)"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><div><div class="toggle-label">Emergency Shutdown</div><div class="toggle-desc">Only Owner can access.</div></div><label class="toggle"><input type="checkbox" ${s.emergency?'checked':''} onchange="saveSetting('emergency',this.checked)"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><div><div class="toggle-label">Debug Mode</div><div class="toggle-desc">Requires maintenance mode.</div></div><label class="toggle"><input type="checkbox" ${s.debug?'checked':''} ${!s.maintenance?'disabled':''} onchange="saveSetting('debug',this.checked)"><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><div><div class="toggle-label">Force WebRTC Fallback</div><div class="toggle-desc">Disables Agora, uses WebRTC (6 person cap).</div></div><label class="toggle"><input type="checkbox" ${s.voiceMode==='webrtc'?'checked':''} onchange="saveSetting('voiceMode',this.checked?'webrtc':'agora')"><span class="toggle-slider"></span></label></div>
    </div>
    <div class="mb-20"></div>
    <div class="card">
      <div class="form-group"><label class="form-label">Maintenance Message</label><input class="form-input" id="sMaintMsg" value="${s.maintenanceMessage||''}"></div>
      <div class="form-group"><label class="form-label">Emergency Message</label><input class="form-input" id="sEmergMsg" value="${s.emergencyMessage||''}"></div>
      <button class="btn btn-primary" onclick="saveMessages()">Save Messages</button>
    </div>
  </div>`;
}
window.saveSetting = async (key,val) => {
  if(key==='debug'){const s=await getDoc(doc(db,'settings','global'));if(!s.data()?.maintenance&&val){alert('Debug requires maintenance mode.');settings();return;}}
  await setDoc(doc(db,'settings','global'),{[key]:val},{merge:true});
  await writeLog(`Setting: ${key}=${val}`); settings();
};
window.saveMessages = async () => {
  await setDoc(doc(db,'settings','global'),{maintenanceMessage:document.getElementById('sMaintMsg').value.trim(),emergencyMessage:document.getElementById('sEmergMsg').value.trim()},{merge:true});
  await writeLog('Updated system messages');
};

  document.getElementById('mainContent').innerHTML=`<div class="panel"><div class="panel-title">System Logs</div><div class="card" style="padding:0">${rows}</div></div>`;
}

  document.getElementById('mainContent').innerHTML='<div class="empty">Loading...</div>';
